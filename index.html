.bmc-cell{border:1.5px solid var(--border);transition:border-color .2s}

.check-row{display:flex;align-items:center;gap:10px;padding:7px 11px;border-radius:9px;cursor:pointer;transition:background .15s}
.check-row:hover{background:var(--bg3)}
.checkbox{width:20px;height:20px;border-radius:5px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all .2s;background:transparent}
.checkbox.checked{background:#22c55e;border-color:#22c55e}
.toast{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:8px;z-index:9999}
.toast-item{background:#0f1c2d;color:#fff;padding:10px 16px;border-radius:12px;font-size:13px;font-weight:500;min-width:220px;box-shadow:0 4px 16px rgba(0,0,0,.25);animation:slideIn .3s ease-out;display:flex;align-items:center;gap:8px;cursor:pointer}

@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}

function fmt(n) {
  const v = parseFloat(String(n||'').replace(/\s/g,'').replace(',','.')) || 0;
  return v.toLocaleString('fr-FR', {maximumFractionDigits:0});
}
function pn(n) { return parseFloat(String(n||'').replace(/\s/g,'').replace(',','.')) || 0; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function h(strings, ...vals) { return strings.reduce((acc,s,i) => acc + s + (vals[i] !== undefined ? vals[i] : ''), ''); }

let toastTimer = {};
function toast(msg, type='info', dur=3000) {
  const c = document.getElementById('toast-container');
  const id = Date.now();
  const el = document.createElement('div');
  el.className = `toast-item ${type}`;
  el.innerHTML = `<span>${type==='success'?'✅':'💬'}</span>${msg}`;
  el.onclick = () => el.remove();
  c.appendChild(el);
  setTimeout(() => el.remove(), dur);
}

function showConfetti() {
  const colors = ['#e9a420','#22c55e','#3b82f6','#a78bfa','#f43f5e'];
  for (let i = 0; i < 70; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `left:${Math.random()*100}%;width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;background:${colors[i%5]};border-radius:2px;animation:confettiFall ${2.5+Math.random()*2}s ${Math.random()*2}s ease-in forwards`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 5000);
  }
}

function progressRingSVG(pct, size=80, sw=7, color='#e9a420') {
  const r = (size-sw*2)/2, c = 2*Math.PI*r, d = (pct/100)*c;
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--border2)" stroke-width="${sw}"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${sw}"
      stroke-dasharray="${d} ${c}" stroke-linecap="round" transform="rotate(-90 ${size/2} ${size/2})"/>
    <text x="${size/2}" y="${size/2}" text-anchor="middle" dominant-baseline="middle"
      font-size="${size*.21}" font-weight="700" fill="${color}" font-family="Playfair Display,serif">${pct}%</text>
  </svg>`;
}

function radarSVG(data) {
  const S=230, cx=S/2, cy=S/2, R=78, n=data.length;
  const pt = (i,r) => ({x:cx+r*Math.cos(2*Math.PI*i/n-Math.PI/2), y:cy+r*Math.sin(2*Math.PI*i/n-Math.PI/2)});
  const dpts = data.map((d,i) => pt(i, R*(d.v/10)));
  const path = dpts.map((p,i) => `${i?'L':'M'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ')+'Z';
  const avg = (data.reduce((s,d)=>s+d.v,0)/data.length).toFixed(1);
  let svg = `<svg viewBox="0 0 ${S} ${S}" style="width:100%;max-width:210px">`;
  [.25,.5,.75,1].forEach(l => {
    const pts = Array.from({length:n},(_,i)=>{const p=pt(i,R*l);return`${p.x.toFixed(1)},${p.y.toFixed(1)}`;}).join(' ');
    svg += `<polygon points="${pts}" fill="none" stroke="var(--border)" stroke-width="1"/>`;
  });
  for(let i=0;i<n;i++){const p=pt(i,R);svg+=`<line x1="${cx}" y1="${cy}" x2="${p.x}" y2="${p.y}" stroke="var(--border)" stroke-width="1"/>`;}
  svg += `<path d="${path}" fill="rgba(233,164,32,.18)" stroke="#e9a420" stroke-width="2.5"/>`;
  dpts.forEach(p => {svg+=`<circle cx="${p.x}" cy="${p.y}" r="4" fill="#e9a420" stroke="var(--bg2)" stroke-width="2"/>`;});
  data.forEach((d,i)=>{const p=pt(i,R+22);svg+=`<text x="${p.x}" y="${p.y}" text-anchor="middle" dominant-baseline="middle" font-size="9.5" fill="var(--text2)" font-family="DM Sans,sans-serif" font-weight="600">${esc(d.abbr)}</text>`;});
  svg += `</svg><div style="font-size:11px;color:var(--text3);margin-top:2px;text-align:center">Intensité moy. <strong style="color:${avg>7?'#ef4444':avg>5?'#f59e0b':'#22c55e'}">${avg}/10</strong></div>`;
  return svg;
}

function calcProgress() {
  const allItems = Object.values(CHECKLIST).flatMap(c=>c.items);
  const oui = allItems.filter(i=>STATE.cl[i.id]==='OUI').length;
  return Math.round(oui/allItems.length*100);
}

function updateProgressUI() {
  const pct = calcProgress();
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-bar').style.width = pct + '%';
  document.getElementById('prog-bar').style.background = pct===100?'#22c55e':'#e9a420';
  document.getElementById('pct-badge').textContent = pct + '% complété';
  if (pct===100) document.getElementById('prog-bar').style.background = '#22c55e';
}

/* ═══════════════════════════════════════════════════
   RENDER ENGINE
═══════════════════════════════════════════════════ */
function render() {
  const c = document.getElementById('app-content');
  c.className = 'section-enter';
  c.innerHTML = '';
  void c.offsetWidth; // reflow to restart animation

  const sections = {
    dashboard: renderDashboard,
    idee: renderIdee,
    marche: renderMarche,
    diagnostic: renderDiagnostic,
    bmc: renderBMC,
    finance: renderFinance,
    marketing: renderMarketing,
    outils: renderOutils,
    examen: renderExamen,
  };
  const fn = sections[STATE.section];
  if (fn) c.innerHTML = fn();
  else c.innerHTML = `<p>Section: ${STATE.section}</p>`;
  bindEvents();
  updateProgressUI();
}

function bindEvents() {
  // Auto-save all textareas and inputs
  document.querySelectorAll('textarea[data-key], input[data-key]').forEach(el => {
    el.addEventListener('input', function() {
      const [obj, key] = this.dataset.key.split('.');
      if (!STATE[obj]) STATE[obj] = {};
      if (key.includes('[')) {
        // array notation like fin.bes[invest]
        const [subobj, rest] = key.split('[');
        const subkey = rest.replace(']','');
        if (!STATE[obj][subobj]) STATE[obj][subobj] = {};
        STATE[obj][subobj][subkey] = this.value;
      } else {
        STATE[obj][key] = this.value;
      }
      save();
    });
  });

  // Range sliders
  document.querySelectorAll('input[type=range][data-key]').forEach(el => {
    el.addEventListener('input', function() {
      const [obj, key] = this.dataset.key.split('.');
      if (!STATE[obj]) STATE[obj] = {};
      if (!STATE[obj][key]) STATE[obj][key] = {};
      STATE[obj][key].intensite = parseInt(this.value);
      if (this.dataset.display) {
        document.getElementById(this.dataset.display).textContent = this.value + '/10';
      }
      save();
      // Re-render radar if needed
      if (this.dataset.radar) updateRadar();
    });
  });

  // Tab buttons
  document.querySelectorAll('[data-tab]').forEach(btn => {
    btn.addEventListener('click', function() {
      const group = this.dataset.tabgroup;
      const tab = this.dataset.tab;
      document.querySelectorAll(`[data-tabgroup="${group}"]`).forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      document.querySelectorAll(`[data-tabcontent="${group}"]`).forEach(c => {
        c.style.display = c.dataset.tabid === tab ? '' : 'none';
      });
    });
  });

  // Checkboxes
  document.querySelectorAll('[data-checkbox]').forEach(el => {
    el.addEventListener('click', function() {
      const key = this.dataset.checkbox;
      const [obj, subkey] = key.split('.');
      if (!STATE[obj]) STATE[obj] = {};
      STATE[obj][subkey] = !STATE[obj][subkey];
      this.classList.toggle('checked', !!STATE[obj][subkey]);
      const check = this.querySelector('span');
      if (check) check.textContent = STATE[obj][subkey] ? '✓' : '';
      save();
    });
  });
}

function setPill(keyPath, val) {
  const parts = keyPath.split('.');
  const [obj, key] = parts;
  if (!STATE[obj]) STATE[obj] = {};
  const prev = STATE[obj][key];
  STATE[obj][key] = val;
  save();
  updateProgressUI();

  // Update just the pill visually
  const el = document.querySelector(`[onclick="setPill('${keyPath}','OUI')"]`);
  if (el) {
    const container = el.closest('div');
    if (container) container.outerHTML = pillHTML(val, keyPath);
  }

  // Update dot color
  if (obj === 'cl') {
    const dots = document.querySelectorAll('[style*="border-radius:50%"]');
    // Full re-render for dashboard consistency
    if (STATE.section === 'dashboard') render();

    // Confetti on 100%
    const pct = calcProgress();
    if (pct === 100 && prev !== 'OUI') showConfetti();
    if (pct > 0 && pct % 25 === 0 && val === 'OUI') toast(`✨ ${pct}% complété !`, 'success');
  }
}

function renderCartePerceptuelle() {
  const c = STATE.diag.carte || {};
  const axeH = c.axeH||'Traditionnel ← → Innovant';
  const axeV = c.axeV||'Peu respectueux ↓ ↑ Très respectueux';
  const nom = c.nomEntreprise||'Mon entreprise';
  const monX = parseFloat(c.monX||75);
  const monY = parseFloat(c.monY||75);
  const concs = c.concurrents || [{nom:'Concurrent A',x:30,y:40},{nom:'Concurrent B',x:65,y:35}];
  const colors = ['#ef4444','#3b82f6','#8b5cf6','#06b6d4','#f97316'];

  // Build SVG
  let svg = `<svg id="carte-svg" viewBox="0 0 300 300" style="width:100%;background:var(--bg3);border-radius:10px;border:1.5px solid var(--border)">`;
  for(let i=1;i<=3;i++){svg+=`<line x1="15" y1="${15+i*67.5}" x2="285" y2="${15+i*67.5}" stroke="var(--border)" stroke-width=".5" stroke-dasharray="2,3"/>`;svg+=`<line x1="${15+i*67.5}" y1="15" x2="${15+i*67.5}" y2="285" stroke="var(--border)" stroke-width=".5" stroke-dasharray="2,3"/>`;}
  svg += `<rect x="15" y="15" width="270" height="270" fill="none" stroke="var(--border2)" stroke-width="1"/>`;
  svg += `<line x1="15" y1="150" x2="285" y2="150" stroke="var(--text3)" stroke-width="1.5"/><line x1="150" y1="15" x2="150" y2="285" stroke="var(--text3)" stroke-width="1.5"/>`;
  svg += `<polygon points="283,147 290,150 283,153" fill="var(--text3)"/><polygon points="147,17 150,10 153,17" fill="var(--text3)"/>`;
  svg += `<text x="150" y="296" text-anchor="middle" font-size="7" fill="var(--text3)" font-family="DM Sans,sans-serif">${esc(axeH.slice(0,38))}</text>`;
  svg += `<text x="9" y="150" text-anchor="middle" font-size="7" fill="var(--text3)" font-family="DM Sans,sans-serif" transform="rotate(-90,9,150)">${esc(axeV.slice(0,28))}</text>`;
  concs.forEach((co,i)=>{
    const cx2=15+(co.x/100)*270, cy2=285-(co.y/100)*270;
    svg+=`<circle cx="${cx2}" cy="${cy2}" r="8" fill="${colors[i%5]}" opacity="0.82"/><text x="${cx2}" y="${cy2-12}" text-anchor="middle" font-size="8.5" fill="var(--text)" font-family="DM Sans,sans-serif" font-weight="600">${esc(co.nom.slice(0,13))}</text>`;
  });
  const cx2=15+(monX/100)*270, cy2=285-(monY/100)*270;
  svg+=`<circle cx="${cx2}" cy="${cy2}" r="10" fill="#e9a420" stroke="#fff" stroke-width="2"/><text x="${cx2}" y="${cy2-14}" text-anchor="middle" font-size="9" fill="#e9a420" font-family="DM Sans,sans-serif" font-weight="700">${esc(nom.slice(0,15))}</text>`;
  svg += `<circle cx="22" cy="292" r="4.5" fill="#e9a420"/><text x="30" y="295" font-size="7" fill="var(--text)" font-family="DM Sans,sans-serif" font-weight="600">Votre entreprise</text>`;
  svg += `</svg>`;

  return `<div style="display:flex;flex-direction:column;gap:13px">
    <div style="background:#eff6ff;border:1.5px solid #bfdbfe;border-radius:12px;padding:10px 15px;font-size:13px;color:#1e40af">
      <strong>Carte perceptuelle :</strong> Positionnez votre entreprise face aux concurrents sur 2 axes. Très apprécié à l'oral.
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:13px">
      <div class="card" style="padding:16px">
        <div class="serif" style="font-weight:700;font-size:14px;color:var(--text);margin-bottom:10px">⚙️ Configuration</div>
        ${[{k:'axeH',l:'Axe horizontal',v:axeH},{k:'axeV',l:'Axe vertical',v:axeV},{k:'nomEntreprise',l:'Votre entreprise',v:nom}].map(f=>`<div style="margin-bottom:8px"><label style="display:block;font-size:10px;font-weight:700;color:var(--text3);margin-bottom:2px">${f.l}</label>
          <input type="text" oninput="updateCarte('${f.k}',this.value)" value="${esc(f.v)}" style="width:100%;padding:7px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;color:var(--text);background:var(--bg2)"/></div>`).join('')}

  if (!STATE.diag.carte) STATE.diag.carte = {};
  STATE.diag.carte[key] = val;
  save();
  refreshCarte();
}
function updateCartePos(key, val) {
  if (!STATE.diag.carte) STATE.diag.carte = {};
  STATE.diag.carte[key] = parseFloat(val);
  save();
  refreshCarte();
}
function addConcurrent() {
  if (!STATE.diag.carte) STATE.diag.carte = {};
  if (!STATE.diag.carte.concurrents) STATE.diag.carte.concurrents = [];
  STATE.diag.carte.concurrents.push({nom:`Conc. ${STATE.diag.carte.concurrents.length+1}`,x:50,y:50});

  refreshCarte();

function removeConcurrent(i) {
  if (!STATE.diag.carte?.concurrents) return;

}
function updateConcurrent(i, key, val) {
  if (!STATE.diag.carte?.concurrents) return;
  STATE.diag.carte.concurrents[i][key] = val;
  save();
  refreshCarte();
}

  for(let i=1;i<=3;i++){svg+=`<line x1="15" y1="${15+i*67.5}" x2="285" y2="${15+i*67.5}" stroke="var(--border)" stroke-width=".5" stroke-dasharray="2,3"/>`;svg+=`<line x1="${15+i*67.5}" y1="15" x2="${15+i*67.5}" y2="285" stroke="var(--border)" stroke-width=".5" stroke-dasharray="2,3"/>`;}
  svg+=`<rect x="15" y="15" width="270" height="270" fill="none" stroke="var(--border2)" stroke-width="1"/>`;
  svg+=`<line x1="15" y1="150" x2="285" y2="150" stroke="var(--text3)" stroke-width="1.5"/><line x1="150" y1="15" x2="150" y2="285" stroke="var(--text3)" stroke-width="1.5"/>`;
  svg+=`<polygon points="283,147 290,150 283,153" fill="var(--text3)"/><polygon points="147,17 150,10 153,17" fill="var(--text3)"/>`;
  svg+=`<text x="150" y="296" text-anchor="middle" font-size="7" fill="var(--text3)" font-family="DM Sans,sans-serif">${esc(axeH.slice(0,38))}</text>`;
  svg+=`<text x="9" y="150" text-anchor="middle" font-size="7" fill="var(--text3)" font-family="DM Sans,sans-serif" transform="rotate(-90,9,150)">${esc(axeV.slice(0,28))}</text>`;
  concs.forEach((co,i)=>{const cx2=15+(co.x/100)*270,cy2=285-(co.y/100)*270;svg+=`<circle cx="${cx2}" cy="${cy2}" r="8" fill="${colors[i%5]}" opacity=".82"/><text x="${cx2}" y="${cy2-12}" text-anchor="middle" font-size="8.5" fill="var(--text)" font-family="DM Sans,sans-serif" font-weight="600">${esc(co.nom.slice(0,13))}</text>`;});
  const cx2=15+(monX/100)*270,cy2=285-(monY/100)*270;

  svg+=`<circle cx="22" cy="292" r="4.5" fill="#e9a420"/><text x="30" y="295" font-size="7" fill="var(--text)" font-family="DM Sans,sans-serif" font-weight="600">Votre entreprise</text></svg>`;
  container.innerHTML = svg;
}

function updateRisque(i, key, val) {

function updatePorterSlider(el, id) {

function renderFinance() {

  const totRes=['apport','emprunt','aides','autres'].reduce((s,k)=>s+gF('res',k),0);

  const ca1=gC('y1','ca'),ach1=gC('y1','ach'),cf1=gC('y1','cf'),ac1=gC('y1','ac');
  const txM=ca1>0?((ca1-ach1)/ca1)*100:0;const cfTot=cf1+ac1;
  const sr=txM>0?cfTot/(txM/100):0;const srPct=ca1>0?(sr/ca1)*100:0;const moisSR=ca1>0?Math.ceil(sr/(ca1/12)):0;

        ${[{t:'bes',title:'BESOINS',fields:[['invest','Investissements HT'],['bfr','BFR'],['treso_dep','Trésorerie départ'],['frais','Frais démarrage']],total:totBes},{t:'res',title:'RESSOURCES',fields:[['apport','Apport personnel'],['emprunt','Emprunt bancaire'],['aides','Aides & subventions'],['autres','Autres ressources']],total:totRes}].map((s,si)=>`<div style="padding:16px;${si===0?'border-right:1.5px solid var(--border)':''}">

          <table style="width:100%;font-size:12px;border-collapse:collapse">
            <tbody>${s.fields.map(([k,l])=>`<tr style="border-top:1px solid var(--border)"><td style="padding:5px 0;color:var(--text2);padding-right:8px;font-size:11px">${l}</td><td style="padding:3px 0;width:95px">${finInput(s.t,k,d.fin?.[s.t]?.[k])}</td></tr>`).join('')}</tbody>

          ${item.sec?`<div style="font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin:9px 0 4px;padding-top:7px;border-top:1px solid var(--border)">${item.sec}</div>`:''}
          <div style="display:flex;align-items:center;justify-content:space-between;gap:9px;padding:6px 11px;border-radius:8px;background:${d['oral_'+item.id]==='OUI'?'rgba(34,197,94,.06)':'var(--bg3)'}">
            <div style="display:flex;align-items:center;gap:6px"><div style="width:6px;height:6px;border-radius:50%;flex-shrink:0;background:${d['oral_'+item.id]==='OUI'?'#22c55e':d['oral_'+item.id]==='EN COURS'?'#f59e0b':'var(--border2)'}"></div>
              <span style="font-size:11.5px;color:${d['oral_'+item.id]==='OUI'?'var(--text4)':'var(--text2)'};text-decoration:${d['oral_'+item.id]==='OUI'?'line-through':'none'}">${item.l}</span></div>
            ${pillHTML(d['oral_'+item.id]||'NON','exam.oral_'+item.id)}
          </div>`).join('')}
      </div>
    </div>
  </div>

  <div data-tabcontent="exam" data-tabid="questions" style="display:none">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;flex-wrap:wrap;gap:7px">
      <div><div class="serif" style="font-weight:700;font-size:16px;color:var(--text)">Banque de Questions</div><p style="font-size:11px;color:var(--text3)">${qDone}/${QUESTIONS_BANK.length} préparées</p></div>
      <div style="width:110px;height:4px;background:var(--border2);border-radius:2px"><div style="height:4px;width:${qDone/QUESTIONS_BANK.length*100}%;background:#22c55e;border-radius:2px"></div></div>
    </div>
    <div style="display:flex;flex-direction:column;gap:7px">
      ${QUESTIONS_BANK.map((q,i)=>{
        const qkey = 'q_'+btoa(q.q).slice(0,10);
        const isC = !!d[qkey];
        const catColors={Projet:'#7c3aed',Marché:'#0891b2',Stratégie:'#059669',Finance:'#d97706',Opérations:'#e9a420',Pitch:'#ef4444'};
        return `<div class="card" style="overflow:hidden;border-left:3px solid ${catColors[q.cat]||'#e9a420'};background:${isC?'rgba(34,197,94,.04)':'var(--bg2)'}">
          <div style="padding:9px 13px;display:flex;align-items:center;gap:8px">
            <div class="checkbox ${isC?'checked':''}" onclick="toggleQuestion('${qkey}')"><span style="color:#fff;font-size:11px;font-weight:700">${isC?'✓':''}</span></div>
            <div style="flex:1"><div style="font-size:9.5px;color:${catColors[q.cat]};font-weight:700;margin-bottom:1px">${q.cat}</div><div style="font-size:12.5px;color:var(--text);font-weight:500">${q.q}</div></div>
            <button onclick="toggleQDetail(${i})" style="font-size:10px;padding:3px 8px;border:1px solid var(--border);background:var(--bg3);border-radius:7px;cursor:pointer;color:var(--text3);font-family:'DM Sans',sans-serif">Conseil</button>
          </div>
          <div id="q-detail-${i}" style="display:none;border-top:1px solid var(--border);padding:10px 13px;background:var(--bg3)">
            <div style="font-size:11px;color:#0891b2;font-weight:600;margin-bottom:4px">💡 Conseil :</div>
            <div style="font-size:11.5px;color:var(--text2);line-height:1.6;margin-bottom:9px;background:rgba(8,145,178,.08);padding:7px 11px;border-radius:7px">${q.tip}</div>
            <label style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;display:block;margin-bottom:3px">📝 Ma réponse :</label>
            <textarea oninput="setQNote('${qkey}',this.value)" placeholder="Préparez votre réponse..." rows="3" style="width:100%;font-size:12px;color:var(--text2);border:1.5px solid var(--border);border-radius:7px;padding:7px 10px;resize:vertical;background:var(--bg2)">${esc(d[qkey+'_note']||'')}</textarea>
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>

  <div data-tabcontent="exam" data-tabid="grille" style="display:none">
    <div class="card" style="overflow:hidden">
      <div style="padding:11px 17px;background:var(--navy)"><div class="serif" style="font-weight:700;font-size:15px;color:#fff">Simulateur Annexe 19</div><p style="font-size:11px;color:#93c5fd;margin-top:1px">Notez de 0 à 20 pour estimer votre note finale</p></div>
      <table style="width:100%;font-size:12px;border-collapse:collapse">
        <thead><tr style="background:var(--bg3);border-bottom:1.5px solid var(--border)"><th style="text-align:left;padding:7px 14px;font-weight:600;color:var(--text)">Critère</th><th style="text-align:center;padding:7px;font-weight:600;color:var(--text);width:55px">Coef.</th><th style="text-align:center;padding:7px;font-weight:600;color:var(--text);width:70px">/20</th><th style="text-align:right;padding:7px 12px;font-weight:600;color:var(--text);width:65px">Points</th></tr></thead>
        <tbody>
          ${GRILLE_DEF.map((g,i)=>{const n=pn(scores[i]);const pts=n*g.coef;return`<tr style="border-bottom:1px solid var(--border);background:${i%2?'var(--bg3)':'var(--bg2)'}"><td style="padding:8px 14px"><div style="font-weight:600;color:var(--text);font-size:12px">${g.c}</div><div style="font-size:10px;color:var(--text3);margin-top:1px">${g.d}</div></td><td style="text-align:center;padding:8px 6px"><span style="background:rgba(233,164,32,.15);color:#92400e;padding:1px 8px;border-radius:20px;font-weight:700;font-size:10px">×${g.coef}</span></td><td style="text-align:center;padding:7px"><input type="number" min="0" max="20" step="0.5" value="${esc(scores[i]||'')}" oninput="setGrille(${i},this.value)" style="width:52px;text-align:center;font-size:13px;font-weight:700;border:1.5px solid var(--border);border-radius:7px;padding:4px;color:#e9a420;background:var(--bg2);outline:none;font-family:'DM Sans',sans-serif"/></td><td style="text-align:right;padding:8px 12px;font-weight:700;color:${n>=12?'#16a34a':n>=8?'#d97706':'var(--text4)'};font-size:13px">${n>0?pts.toFixed(1):'-'}</td></tr>`;}).join('')}
        </tbody>
      </table>
      <div style="padding:13px 17px;background:var(--bg3);border-top:2px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">
        <div><div style="font-size:11px;color:var(--text3)">Note simulée</div><div class="serif" style="font-size:32px;font-weight:700;color:${parseFloat(nf)>=12?'#16a34a':parseFloat(nf)>=8?'#d97706':'#dc2626'}">${nf}/20</div></div>
        <div style="text-align:right"><div style="font-size:11px;color:var(--text3)">Mention</div><div style="font-size:16px;font-weight:700;color:var(--text)">${parseFloat(nf)>=16?'🏆 Très Bien':parseFloat(nf)>=14?'✅ Bien':parseFloat(nf)>=12?'✔️ Assez Bien':parseFloat(nf)>=10?'📘 Passable':'⚠️ Insuffisant'}</div></div>
        <div style="width:100%;height:7px;background:var(--border2);border-radius:4px"><div style="height:100%;width:${parseFloat(nf)/20*100}%;background:${parseFloat(nf)>=12?'#22c55e':parseFloat(nf)>=8?'#f59e0b':'#ef4444'};border-radius:4px;transition:width .5s"></div></div>
      </div>
    </div>
  </div>`;
}

function setGrille(i, val) {
  if (!STATE.exam.grille) STATE.exam.grille = {};
  STATE.exam.grille[i] = Math.min(20, Math.max(0, parseFloat(val)||0));
  save();
}
function toggleQuestion(key) {
  if (!STATE.exam) STATE.exam = {};
  STATE.exam[key] = !STATE.exam[key];
  save();
  render();
}
function toggleQDetail(i) {
  const el = document.getElementById('q-detail-'+i);
  if (el) el.style.display = el.style.display==='none'?'':'none';
}
function setQNote(key, val) {
  if (!STATE.exam) STATE.exam = {};
  STATE.exam[key+'_note'] = val;
  save();
}

// ORAL TIMER
let oralTimerInterval = null;
let oralTimerElapsed = 0;
let oralTimerPhase = 'idle';
const TIMER_MAX = 600;

function startOralTimer() {
  oralTimerPhase = 'presentation';
  oralTimerElapsed = 0;
  document.getElementById('timer-start-btn').style.display = 'none';
  document.getElementById('timer-reset-btn').style.display = '';
  updateTimerPhaseUI();
  oralTimerInterval = setInterval(() => {
    oralTimerElapsed++;
    if (oralTimerElapsed >= TIMER_MAX) {
      clearInterval(oralTimerInterval);
      if (oralTimerPhase === 'presentation') {
        oralTimerPhase = 'pause';
        oralTimerElapsed = 0;
        document.getElementById('timer-msg').innerHTML = '<div style="background:#fef3c7;border:1.5px solid #fde68a;border-radius:10px;padding:10px 14px;color:#92400e;font-weight:600">🔔 Présentation terminée ! Le jury va maintenant poser ses questions.</div><button onclick="startQuestionsTimer()" style="margin-top:8px;background:#3b82f6;color:#fff;padding:8px 18px;border-radius:9px;font-size:13px;font-weight:600;border:none;cursor:pointer;font-family:\'DM Sans\',sans-serif">▶ Démarrer les questions</button>';
        document.getElementById('timer-time').style.display = 'none';
      } else if (oralTimerPhase === 'questions') {
        oralTimerPhase = 'done';
        document.getElementById('timer-msg').innerHTML = '<div style="background:#f0fdf4;border:1.5px solid #86efac;border-radius:10px;padding:10px 14px;color:#166534;font-weight:600">🎉 Oral terminé ! Excellent travail.</div>';
        document.getElementById('timer-time').style.display = 'none';
      }
      return;
    }
    updateTimerDisplay();
  }, 1000);
}
function startQuestionsTimer() {
  oralTimerPhase = 'questions';
  oralTimerElapsed = 0;
  document.getElementById('timer-time').style.display = '';
  document.getElementById('timer-msg').innerHTML = '';
  updateTimerPhaseUI();
  oralTimerInterval = setInterval(() => {
    oralTimerElapsed++;
    if (oralTimerElapsed >= TIMER_MAX) { clearInterval(oralTimerInterval); oralTimerPhase='done'; document.getElementById('timer-msg').innerHTML='<div style="background:#f0fdf4;border:1.5px solid #86efac;border-radius:10px;padding:10px 14px;color:#166534;font-weight:600">🎉 Oral terminé !</div>'; document.getElementById('timer-time').style.display='none'; return; }
    updateTimerDisplay();
  }, 1000);
}
function resetOralTimer() {
  clearInterval(oralTimerInterval);
  oralTimerPhase='idle'; oralTimerElapsed=0;
  document.getElementById('timer-start-btn').style.display='';
  document.getElementById('timer-reset-btn').style.display='none';
  document.getElementById('timer-ring').innerHTML = progressRingSVG(0, 120, 8, 'var(--border2)');
  document.getElementById('timer-time').textContent='10:00'; document.getElementById('timer-time').style.cssText='font-size:32px;font-weight:700;color:var(--border2);font-variant-numeric:tabular-nums;margin-bottom:7px;letter-spacing:2px';
  document.getElementById('timer-msg').textContent='Prêt(e) pour votre simulation ?';
  [0,1,2].forEach(i=>{const el=document.getElementById('timer-phase-'+i);if(el){el.style.background='var(--border2)';el.style.color='var(--text4)';el.textContent=i+1;}});
}
function updateTimerDisplay() {
  const rem = TIMER_MAX - oralTimerElapsed;
  const m = Math.floor(rem/60), s = rem%60;
  const pct = Math.round((oralTimerElapsed/TIMER_MAX)*100);
  const color = rem<60?'#ef4444':rem<120?'#f59e0b':'#22c55e';
  const ring = document.getElementById('timer-ring');
  if (ring) ring.innerHTML = progressRingSVG(pct, 120, 8, color);
  const timeEl = document.getElementById('timer-time');
  if (timeEl) { timeEl.textContent=`${m}:${String(s).padStart(2,'0')}`; timeEl.style.color=color; }
  if (rem<=60) {
    const msg = document.getElementById('timer-msg');
    if (msg && !msg.querySelector('.urgent')) msg.innerHTML='<div class="urgent" style="font-size:12px;font-weight:700;color:#ef4444;animation:bounce 1s ease infinite">⚠️ Moins d\'une minute !</div>';
  }
}
function updateTimerPhaseUI() {
  const phaseMap = {presentation:0, questions:2};
  const activeIdx = phaseMap[oralTimerPhase];
  [0,1,2].forEach(i=>{
    const el = document.getElementById('timer-phase-'+i);
    if (!el) return;
    if (i < activeIdx) { el.style.background='#22c55e'; el.style.color='#fff'; el.textContent='✓'; }
    else if (i === activeIdx) { el.style.background='#e9a420'; el.style.color='#fff'; el.textContent=i+1; }
    else { el.style.background='var(--border2)'; el.style.color='var(--text4)'; el.textContent=i+1; }
  });
}

let randomQTimer = null;
function drawRandomQuestion() {
  clearInterval(randomQTimer);
  const q = QUESTIONS_BANK[Math.floor(Math.random()*QUESTIONS_BANK.length)];
  let elapsed2 = 0;
  const catColors = {Projet:'#7c3aed',Marché:'#0891b2',Stratégie:'#059669',Finance:'#d97706',Pitch:'#ef4444'};
  const container = document.getElementById('random-q-content');
  if (!container) return;
  container.innerHTML = `<div style="background:var(--navy);border-radius:11px;padding:12px 16px;margin-bottom:9px"><div style="font-size:9.5px;color:#e9a420;font-weight:700;margin-bottom:3px;text-transform:uppercase">${q.cat}</div><div style="font-size:14px;font-weight:600;color:#fff;line-height:1.5">${esc(q.q)}</div></div>
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:7px"><div id="rq-ring">${progressRingSVG(0, 55, 5, '#22c55e')}</div><div id="rq-time" style="font-size:22px;font-weight:700;color:#22c55e;font-variant-numeric:tabular-nums">2:00</div><button onclick="toggleRqTip()" style="padding:6px 12px;background:rgba(233,164,32,.15);border:1.5px solid #e9a420;border-radius:8px;cursor:pointer;font-size:11px;font-weight:600;color:#92400e;font-family:'DM Sans',sans-serif">💡 Conseil</button></div>
  <div id="rq-tip" style="display:none;background:rgba(8,145,178,.08);border:1.5px solid rgba(8,145,178,.25);border-radius:8px;padding:9px 12px;font-size:12px;color:#0891b2;line-height:1.6">${esc(q.tip)}</div>`;
  randomQTimer = setInterval(()=>{
    elapsed2++;
    const rem2=120-elapsed2;const pct2=Math.round((elapsed2/120)*100);const col2=rem2<30?'#ef4444':rem2<60?'#f59e0b':'#22c55e';
    const rqRing=document.getElementById('rq-ring');const rqTime=document.getElementById('rq-time');
    if(rqRing)rqRing.innerHTML=progressRingSVG(pct2,55,5,col2);
    if(rqTime){rqTime.textContent=`${Math.floor(rem2/60)}:${String(rem2%60).padStart(2,'0')}`;rqTime.style.color=col2;}
    if(elapsed2>=120){clearInterval(randomQTimer);}
  },1000);
}
function toggleRqTip() {
  const el=document.getElementById('rq-tip');if(el)el.style.display=el.style.display==='none'?'':'none';
}

/* ═══════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════ */
function renderTabs(group, tabs) {
  return `<div style="display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap">
    ${tabs.map((t,i)=>`<button class="tab-btn ${i===0?'active':''}" data-tab="${t.id}" data-tabgroup="${group}">${t.l}</button>`).join('')}
  </div>`;
}

/* ═══════════════════════════════════════════════════
   DARK MODE
═══════════════════════════════════════════════════ */
function toggleDark() {
  STATE.dark = !STATE.dark;
  document.body.classList.toggle('dark', STATE.dark);
  document.getElementById('dark-btn').textContent = STATE.dark ? '☀️ Mode clair' : '🌙 Mode sombre';
  save();
}

/* ═══════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════ */
// Apply dark mode
if (STATE.dark) {
  document.body.classList.add('dark');
  document.getElementById('dark-btn').textContent = '☀️ Mode clair';
}

// Build nav and render initial section
buildNav();
render();
</script>
</body>
</html>
