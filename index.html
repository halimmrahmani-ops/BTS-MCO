function useLS(key,init){
  const[val,setVal]=useState(()=>{
    try{const s=localStorage.getItem(key);return s?JSON.parse(s):init;}catch{return init;}
  });
  useEffect(()=>{try{localStorage.setItem(key,JSON.stringify(val));}catch{}},[key,val]);
  return[val,setVal];
}
function fmt(n){const v=parseFloat(String(n||'').replace(/\s/g,'').replace(',','.'))||0;return v.toLocaleString('fr-FR',{maximumFractionDigits:0});}
function pn(n){return parseFloat(String(n||'').replace(/\s/g,'').replace(',','.'))||0;}
function fmtTime(s){const m=Math.floor(s/60),sec=s%60;return`${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;}

function Confetti({active}){
  if(!active)return null;
  const pieces=Array.from({length:80},(_,i)=>({
    id:i,color:['#e9a420','#f5c55a','#22c55e','#3b82f6','#a78bfa','#f43f5e','#fb923c'][i%7],
    left:Math.random()*100,delay:Math.random()*2,duration:2.5+Math.random()*2,
    size:6+Math.random()*8,shape:Math.random()>.5?'circle':'square',
    rotate:Math.random()*360
  }));
  return(
    <div style={{position:'fixed',top:0,left:0,width:'100%',height:'100%',pointerEvents:'none',zIndex:9999,overflow:'hidden'}}>
      {pieces.map(p=>(
        <div key={p.id} className="confetti-piece" style={{
          left:`${p.left}%`,width:p.size,height:p.size,
          backgroundColor:p.color,
          borderRadius:p.shape==='circle'?'50%':'2px',
          animation:`confettiFall ${p.duration}s ${p.delay}s ease-in forwards`,
          transform:`rotate(${p.rotate}deg)`,
        }}/>
      ))}
    </div>
  );
}

═══════════════════════════════════════════════════════ */

function Toast({toasts,removeToast}){
  return(
    <div style={{position:'fixed',bottom:24,right:24,display:'flex',flexDirection:'column',gap:8,zIndex:8888,pointerEvents:'none'}}>
      {toasts.map(t=>(
        <div key={t.id} className="toast-enter" style={{
          background:t.type==='success'?'#166534':t.type==='error'?'#991b1b':'#0f1c2d',
          color:'#fff',padding:'10px 16px',borderRadius:12,
          fontSize:13,fontWeight:500,minWidth:220,maxWidth:320,
          boxShadow:'0 4px 16px rgba(0,0,0,.25)',display:'flex',alignItems:'center',gap:8,
          pointerEvents:'auto',cursor:'pointer'
        }} onClick={()=>removeToast(t.id)}>
          <span style={{fontSize:16}}>{t.type==='success'?'✅':t.type==='error'?'❌':'💬'}</span>
          {t.msg}
        </div>
      ))}
    </div>
  );
}

function useToasts(){
  const[toasts,setToasts]=useState([]);
  const add=useCallback((msg,type='info',dur=3000)=>{
    const id=Date.now();
    setToasts(p=>[...p,{id,msg,type}]);
    setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),dur);
  },[]);
  const rm=useCallback(id=>setToasts(p=>p.filter(t=>t.id!==id)),[]);
  return{toasts,add,rm};
}

function ProgressRing({pct,size=80,sw=7,color='#e9a420',animate=true}){
  const r=(size-sw*2)/2,c=2*Math.PI*r,d=(pct/100)*c;
  return(
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--border2)" strokeWidth={sw}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={sw}
        strokeDasharray={`${d} ${c}`} strokeLinecap="round"
        transform={`rotate(-90 ${size/2} ${size/2})`}
        style={animate?{transition:'stroke-dasharray .6s ease'}:{}}/>
      <text x={size/2} y={size/2} textAnchor="middle" dominantBaseline="middle"
        fontSize={size*.21} fontWeight="700" fill={color} fontFamily="Playfair Display,serif">
        {pct}%
      </text>
    </svg>
  );
}

function Pill({val,onChange}){
  const opts=['OUI','EN COURS','NON'];
  const styles={
    OUI:{on:{background:'#22c55e',color:'#fff',borderColor:'#22c55e'},off:{background:'#dcfce7',color:'#166534',borderColor:'#86efac'}},
    'EN COURS':{on:{background:'#f59e0b',color:'#fff',borderColor:'#f59e0b'},off:{background:'#fef9c3',color:'#854d0e',borderColor:'#fde047'}},
    NON:{on:{background:'#ef4444',color:'#fff',borderColor:'#ef4444'},off:{background:'#fee2e2',color:'#991b1b',borderColor:'#fca5a5'}},
  };
  return(
    <div style={{display:'flex',gap:3}}>
      {opts.map(o=>(
        <button key={o} onClick={()=>onChange(o)} className="pill"
          style={{...( val===o?styles[o].on:styles[o].off),fontSize:10,padding:'2px 7px'}}>
          {o}
        </button>
      ))}
    </div>
  );
}

function RadarChart({data}){
  const S=260,cx=S/2,cy=S/2,R=88,n=data.length;
  const pt=(i,r)=>({x:cx+r*Math.cos(2*Math.PI*i/n-Math.PI/2),y:cy+r*Math.sin(2*Math.PI*i/n-Math.PI/2)});
  const lvls=[.25,.5,.75,1];
  const dpts=data.map((d,i)=>pt(i,R*(d.v/10)));
  const path=dpts.map((p,i)=>`${i?'L':'M'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ')+'Z';
  const avgIntensity=(data.reduce((s,d)=>s+d.v,0)/data.length).toFixed(1);
  const threatColor=avgIntensity>7?'#ef4444':avgIntensity>5?'#f59e0b':'#22c55e';
  return(
    <div style={{textAlign:'center'}}>
      <svg viewBox={`0 0 ${S} ${S}`} style={{width:'100%',maxWidth:240}}>
        {lvls.map(l=>(
          <polygon key={l}
            points={Array.from({length:n},(_,i)=>{const p=pt(i,R*l);return`${p.x.toFixed(1)},${p.y.toFixed(1)}`;}).join(' ')}
            fill="none" stroke="var(--border)" strokeWidth="1"/>
        ))}
        {Array.from({length:n},(_,i)=>{const p=pt(i,R);return<line key={i} x1={cx} y1={cy} x2={p.x} y2={p.y} stroke="var(--border)" strokeWidth="1"/>;} )}
        <path d={path} fill="rgba(233,164,32,.18)" stroke="#e9a420" strokeWidth="2.5"/>
        {dpts.map((p,i)=><circle key={i} cx={p.x} cy={p.y} r="4.5" fill="#e9a420" stroke="var(--bg2)" strokeWidth="2"/>)}
        {data.map((d,i)=>{
          const p=pt(i,R+24);
          return<text key={i} x={p.x} y={p.y} textAnchor="middle" dominantBaseline="middle" fontSize="10" fill="var(--text2)" fontFamily="DM Sans,sans-serif" fontWeight="600">{d.abbr}</text>;
        })}
      </svg>
      <div style={{fontSize:12,color:'var(--text3)',marginTop:4}}>
        Intensité moyenne : <strong style={{color:threatColor}}>{avgIntensity}/10</strong>

function MiniBarChart({data,color='#e9a420',height=60}){

    <div style={{display:'flex',alignItems:'flex-end',gap:3,height,width:'100%'}}>
      {data.map((d,i)=>{

/* ═══════════════════════════════════════════════════════
   TIMER ORAL
═══════════════════════════════════════════════════════ */

function OralTimer(){
  const[phase,setPhase]=useState('idle'); // idle | presentation | pause | questions | done
  const[elapsed,setElapsed]=useState(0);
  const[totalPresented,setTotalPresented]=useState(0);
  const interval=useRef(null);
  const PRES_TIME=10*60,QUEST_TIME=10*60;

  const currentLimit=phase==='presentation'?PRES_TIME:phase==='questions'?QUEST_TIME:0;
  const remaining=phase==='presentation'?PRES_TIME-elapsed:phase==='questions'?QUEST_TIME-elapsed:0;
  const pct=currentLimit>0?Math.min(100,(elapsed/currentLimit)*100):0;

  useEffect(()=>{
    if(phase==='presentation'||phase==='questions'){
      interval.current=setInterval(()=>{
        setElapsed(e=>{
          if(e+1>=currentLimit){
            clearInterval(interval.current);
            if(phase==='presentation'){setPhase('pause');setTotalPresented(e+1);}
            else setPhase('done');
            return e+1;
          }
          return e+1;
        });
      },1000);
    }
    return()=>clearInterval(interval.current);
  },[phase]);

  const start=()=>{setPhase('presentation');setElapsed(0);};
  const startQ=()=>{setPhase('questions');setElapsed(0);};
  const reset=()=>{clearInterval(interval.current);setPhase('idle');setElapsed(0);setTotalPresented(0);};

  const ringColor=remaining<60?'#ef4444':remaining<120?'#f59e0b':'#22c55e';
  const urgency=remaining<60&&(phase==='presentation'||phase==='questions');

  return(
    <div className="card" style={{padding:24,textAlign:'center',animation:urgency?'pulseGold 1s ease infinite':'none'}}>
      <div className="font-display" style={{fontWeight:700,fontSize:18,color:'var(--text)',marginBottom:4}}>
        ⏱️ Chronomètre Oral
      </div>
      <p style={{fontSize:12,color:'var(--text3)',marginBottom:20}}>Format officiel : 10 min présentation + 10 min questions jury</p>

      {/* Phase indicator */}
      <div style={{display:'flex',gap:8,justifyContent:'center',marginBottom:20}}>
        {['Présentation','Transition','Questions'].map((l,i)=>{
          const done=(i===0&&(phase==='pause'||phase==='questions'||phase==='done'))||(i===1&&(phase==='questions'||phase==='done'))||(i===2&&phase==='done');
          const active=(i===0&&phase==='presentation')||(i===1&&phase==='pause')||(i===2&&phase==='questions');
          return(
            <div key={i} style={{display:'flex',alignItems:'center',gap:4}}>
              <div style={{width:28,height:28,borderRadius:'50%',fontSize:11,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',
                background:done?'#22c55e':active?'#e9a420':'var(--border2)',
                color:done||active?'#fff':'var(--text4)',transition:'all .3s'}}>
                {done?'✓':i+1}
              </div>
              <span style={{fontSize:11,fontWeight:500,color:active?'var(--text)':'var(--text4)'}}>{l}</span>
              {i<2&&<div style={{width:20,height:2,background:'var(--border2)',borderRadius:2}}/>}
            </div>
          );
        })}
      </div>

      {/* Timer display */}
      <div style={{position:'relative',display:'inline-block',marginBottom:16}}>
        <ProgressRing pct={Math.round(pct)} size={140} sw={10} color={phase==='idle'?'var(--border2)':ringColor}/>
        {phase!=='idle'&&phase!=='done'&&(
          <div style={{position:'absolute',bottom:-4,left:'50%',transform:'translateX(-50%)',
            fontSize:11,fontWeight:700,color:ringColor,background:'var(--bg2)',padding:'2px 10px',borderRadius:20,border:`1.5px solid ${ringColor}`}}>
            {phase==='presentation'?'PRÉSENTATION':phase==='questions'?'QUESTIONS':'⏸️ PAUSE'}
          </div>
        )}
      </div>

      {phase==='presentation'||phase==='questions'?(
        <div style={{fontSize:36,fontWeight:700,letterSpacing:2,color:ringColor,fontVariantNumeric:'tabular-nums',marginBottom:8,fontFamily:'DM Sans,sans-serif'}}>
          {fmtTime(remaining)}
        </div>
      ):null}

      {/* Messages */}
      {phase==='idle'&&<p style={{color:'var(--text3)',fontSize:13,marginBottom:16}}>Prêt à démarrer votre simulation d'oral ?</p>}
      {phase==='pause'&&(
        <div style={{background:'#fef3c7',border:'1.5px solid #fde68a',borderRadius:12,padding:'12px 16px',marginBottom:12,textAlign:'center'}}>
          <div style={{fontWeight:700,color:'#92400e',fontSize:15}}>🔔 Présentation terminée !</div>
          <p style={{color:'#92400e',fontSize:12,marginTop:4}}>Temps utilisé : {fmtTime(totalPresented)}/{fmtTime(PRES_TIME)}</p>
          <p style={{color:'#92400e',fontSize:12}}>Transition — le jury va maintenant poser ses questions.</p>
        </div>
      )}
      {phase==='done'&&(
        <div style={{background:'#f0fdf4',border:'1.5px solid #86efac',borderRadius:12,padding:'12px 16px',marginBottom:12}}>
          <div style={{fontWeight:700,color:'#166534',fontSize:15}}>🎉 Oral terminé ! Excellent travail.</div>
          <p style={{color:'#166534',fontSize:12,marginTop:4}}>Prenez 2 minutes pour noter ce qui s'est bien passé et ce à améliorer.</p>
        </div>
      )}

      {/* Buttons */}
      <div style={{display:'flex',gap:8,justifyContent:'center',flexWrap:'wrap'}}>
        {phase==='idle'&&(
          <button onClick={start} style={{background:'#22c55e',color:'#fff',padding:'10px 24px',borderRadius:10,fontSize:14,fontWeight:600,border:'none',cursor:'pointer',boxShadow:'0 3px 12px rgba(34,197,94,.35)'}}>
            ▶ Démarrer la présentation
          </button>
        )}
        {phase==='pause'&&(
          <button onClick={startQ} style={{background:'#3b82f6',color:'#fff',padding:'10px 24px',borderRadius:10,fontSize:14,fontWeight:600,border:'none',cursor:'pointer',boxShadow:'0 3px 12px rgba(59,130,246,.35)'}}>
            ▶ Démarrer les questions
          </button>
        )}
        {(phase!=='idle')&&(
          <button onClick={reset} style={{background:'var(--bg3)',color:'var(--text3)',padding:'10px 16px',borderRadius:10,fontSize:13,fontWeight:500,border:'1.5px solid var(--border)',cursor:'pointer'}}>
            ↺ Recommencer
          </button>
        )}
      </div>

      {(phase==='presentation'||phase==='questions')&&remaining<=60&&(
        <div style={{marginTop:12,fontSize:13,fontWeight:700,color:'#ef4444',animation:'bounce 1s ease infinite'}}>
          ⚠️ Moins d'une minute !
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   SEUIL DE RENTABILITÉ
═══════════════════════════════════════════════════════ */

function SeuilRentabilite({finData}){
  const gC=(y,k)=>pn(finData?.cr?.[y]?.[k]);
  const ca1=gC('y1','ca'),ach1=gC('y1','ach'),cf1=gC('y1','cf'),ac1=gC('y1','ac');
  const marge1=ca1-ach1;
  const txMarge=ca1>0?(marge1/ca1)*100:0;
  const chargesFixes=cf1+ac1;
  const sr=txMarge>0?chargesFixes/(txMarge/100):0;
  const srPct=ca1>0?(sr/ca1)*100:0;
  const moisSR=ca1>0?Math.ceil(sr/(ca1/12)):0;

  return(
    <div className="card" style={{padding:20}}>
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}>
        <span style={{fontSize:20}}>📐</span>
        <div>
          <div className="font-display" style={{fontWeight:700,fontSize:16,color:'var(--text)'}}>Seuil de Rentabilité</div>
          <p style={{fontSize:11,color:'var(--text3)'}}>Calculé automatiquement depuis votre Compte de Résultat Année 1</p>
        </div>
      </div>
      {ca1>0&&txMarge>0?(
        <>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:16}}>
            {[
              {l:'Seuil de rentabilité',v:fmt(sr)+' €',c:'#7c3aed',i:'🎯'},
              {l:'% du CA prévu',v:srPct.toFixed(0)+'%',c:srPct<100?'#16a34a':'#dc2626',i:srPct<100?'✅':'⚠️'},
              {l:'Mois pour l\'atteindre',v:moisSR<=12?`Mois ${moisSR}`:'> 12 mois',c:moisSR<=12?'#0891b2':'#d97706',i:'📅'},
            ].map((m,i)=>(
              <div key={i} style={{textAlign:'center',padding:'12px 8px',background:'var(--bg3)',borderRadius:12,border:'1.5px solid var(--border)'}}>
                <div style={{fontSize:18,marginBottom:4}}>{m.i}</div>
                <div style={{fontWeight:700,fontSize:16,color:m.c,fontFamily:'Playfair Display,serif'}}>{m.v}</div>
                <div style={{fontSize:10,color:'var(--text4)',marginTop:2}}>{m.l}</div>
              </div>
            ))}
          </div>
          {/* Visual bar */}
          <div>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'var(--text3)',marginBottom:4}}>
              <span>Charges fixes: <strong style={{color:'var(--text)'}}>{fmt(chargesFixes)} €</strong></span>
              <span>Taux de marge: <strong style={{color:'var(--text)'}}>{txMarge.toFixed(1)}%</strong></span>
            </div>
            <div style={{height:10,background:'var(--border2)',borderRadius:5,overflow:'hidden'}}>
              <div style={{height:'100%',width:`${Math.min(100,srPct)}%`,background:srPct<100?'#22c55e':'#ef4444',borderRadius:5,transition:'width .6s ease',position:'relative'}}>
                <div style={{position:'absolute',right:4,top:'50%',transform:'translateY(-50%)',fontSize:9,color:'#fff',fontWeight:700,whiteSpace:'nowrap'}}>{srPct.toFixed(0)}%</div>
              </div>
            </div>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'var(--text4)',marginTop:2}}>
              <span>0 €</span><span style={{color:srPct<100?'#22c55e':'#dc2626',fontWeight:600}}>↑ SR = {fmt(sr)} €</span><span>CA = {fmt(ca1)} €</span>
            </div>
          </div>
          <p style={{fontSize:12,color:'var(--text3)',marginTop:10,padding:'8px 12px',background:'var(--bg3)',borderRadius:8,border:'1px solid var(--border)'}}>
            <strong>Formule :</strong> SR = Charges Fixes / Taux de marge commerciale = {fmt(chargesFixes)} / {txMarge.toFixed(1)}% = <strong style={{color:'#7c3aed'}}>{fmt(sr)} €</strong>
          </p>
        </>
      ):(
        <div style={{textAlign:'center',padding:24,color:'var(--text4)'}}>
          <div style={{fontSize:40,marginBottom:8}}>💡</div>
          <p style={{fontSize:13}}>Remplissez votre Compte de Résultat (CA, Achats, Charges) pour voir votre seuil de rentabilité calculé automatiquement.</p>
        </div>
      )}
    </div>
  );
}

    return(
      <div className="bmc-cell" style={{borderRadius:8,padding:'12px 14px',minHeight:minH,display:'flex',flexDirection:'column',

          <div style={{gridRow:'1/2',gridColumn:'4/5'}}><Block id="relations"/></div>

/* ═══════════════════════════════════════════════════════

function QuestionBank({data,setData}){
  const[filter,setFilter]=useState('Toutes');
  const[expanded,setExpanded]=useState(null);
  const[notes,setNotes]=useState(data.qnotes||{});
  const[checked,setChecked]=useState(data.qchecked||{});

  const syncNotes=n=>{setNotes(n);setData(p=>({...p,qnotes:n}));};
  const syncChecked=c=>{setChecked(c);setData(p=>({...p,qchecked:c}));};

  const cats=['Toutes','Projet & Marché','Stratégie','Finance','Opérations','Pitch'];
  const filtered=filter==='Toutes'?QUESTION_BANK:QUESTION_BANK.filter(q=>q.cat===filter);
  const done=QUESTION_BANK.filter(q=>checked[q.q]).length;

  const catColors={'Projet & Marché':'#7c3aed','Stratégie':'#0891b2','Finance':'#059669','Opérations':'#d97706','Pitch':'#e9a420'};

  return(
    <div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16,flexWrap:'wrap',gap:10}}>
        <div>
          <div className="font-display" style={{fontWeight:700,fontSize:18,color:'var(--text)'}}>❓ Banque de Questions d'Oral</div>
          <p style={{fontSize:12,color:'var(--text3)',marginTop:2}}>{done}/{QUESTION_BANK.length} questions préparées</p>
        </div>
        <div style={{width:140,height:6,background:'var(--border2)',borderRadius:3}}>
          <div style={{height:'100%',width:`${done/QUESTION_BANK.length*100}%`,background:'#22c55e',borderRadius:3,transition:'width .4s'}}/>
        </div>
      </div>
      <div style={{display:'flex',gap:5,marginBottom:14,flexWrap:'wrap'}}>
        {cats.map(c=>(
          <button key={c} onClick={()=>setFilter(c)}
            style={{padding:'5px 12px',borderRadius:20,fontSize:11,fontWeight:600,cursor:'pointer',border:'1.5px solid transparent',
              background:filter===c?catColors[c]||'var(--navy)':'var(--bg3)',
              color:filter===c?'#fff':'var(--text3)',
              borderColor:filter===c?'transparent':'var(--border)'}}>
            {c}
          </button>
        ))}
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {filtered.map((q,i)=>{
          const isChecked=checked[q.q];
          const isOpen=expanded===i;
          return(
            <div key={i} className="card" style={{overflow:'hidden',borderLeft:`3px solid ${catColors[q.cat]||'#e9a420'}`,
              background:isChecked?'rgba(34,197,94,.04)':'var(--bg2)',opacity:isChecked?.85:1}}>
              <div style={{padding:'11px 16px',display:'flex',alignItems:'center',gap:10,cursor:'pointer'}}
                onClick={()=>setExpanded(isOpen?null:i)}>
                <div style={{width:22,height:22,borderRadius:6,border:`2px solid ${isChecked?'#22c55e':'var(--border)'}`,
                  background:isChecked?'#22c55e':'transparent',display:'flex',alignItems:'center',justifyContent:'center',
                  flexShrink:0,cursor:'pointer',transition:'all .2s'}}
                  onClick={e=>{e.stopPropagation();const nc={...checked,[q.q]:!isChecked};syncChecked(nc);}}>
                  {isChecked&&<span style={{color:'#fff',fontSize:13,fontWeight:700}}>✓</span>}
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:11,color:catColors[q.cat],fontWeight:700,marginBottom:2}}>{q.cat}</div>
                  <div style={{fontSize:13,color:'var(--text)',fontWeight:500,lineHeight:1.4}}>{q.q}</div>
                </div>
                <span style={{fontSize:12,color:'var(--text4)',flexShrink:0}}>{isOpen?'▲':'▼'}</span>
              </div>
              {isOpen&&(
                <div style={{borderTop:'1px solid var(--border)',padding:'12px 16px',background:'var(--bg3)',animation:'fadeIn .2s ease-out'}}>
                  <div style={{fontSize:12,color:'#0891b2',fontWeight:600,marginBottom:6}}>💡 Conseil de réponse :</div>
                  <div style={{fontSize:12,color:'var(--text2)',lineHeight:1.6,marginBottom:10,background:' rgba(8,145,178,.08)',padding:'8px 12px',borderRadius:8,border:'1px solid rgba(8,145,178,.2)'}}>
                    {q.tip}
                  </div>
                  <div>
                    <label style={{fontSize:11,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.05em',display:'block',marginBottom:5}}>📝 Ma réponse préparée :</label>
                    <textarea value={notes[q.q]||''} onChange={e=>{const nn={...notes,[q.q]:e.target.value};syncNotes(nn);}}
                      placeholder="Rédigez votre réponse ici pour la mémoriser..." rows={4}
                      style={{width:'100%',fontSize:12,color:'var(--text2)',border:'1.5px solid var(--border)',borderRadius:8,padding:'9px 12px',resize:'vertical',background:'var(--bg2)',lineHeight:1.55}}/>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

          </div>
        </div>
      )}

      {tab==='questions'&&<QuestionBank data={data} setData={setData}/>}

      {tab==='grille'&&(
        <div>
          <div style={{background:'#fffbeb',border:'1.5px solid #fde68a',borderRadius:12,padding:'10px 16px',marginBottom:16,fontSize:13,color:'#92400e'}}>
            <strong>📋 Grille officielle Annexe 19</strong> — Notez chaque critère de 0 à 20 pour simuler votre note finale.
          </div>
          {(()=>{
            const scores=data.grille||{};
            const total=GRILLE.reduce((s,g,i)=>{const note=pn(scores[i]);return s+(note>0?note*g.coef:0);},0);
            const maxTotal=GRILLE.reduce((s,g)=>s+g.coef*20,0);
            const noteFin=maxTotal>0?(total/maxTotal*20).toFixed(1):0;
            return(
              <>
                <div className="card" style={{overflow:'hidden',marginBottom:16}}>
                  <div style={{padding:'14px 20px',background:'var(--navy)'}}>
                    <div className="font-display" style={{fontWeight:700,fontSize:17,color:'#fff'}}>Simulateur de Note Annexe 19</div>
                    <p style={{fontSize:12,color:'#93c5fd',marginTop:2}}>Évaluez-vous sur chaque critère pour estimer votre note</p>
                  </div>
                  <table style={{width:'100%',fontSize:13,borderCollapse:'collapse'}}>
                    <thead>
                      <tr style={{background:'var(--bg3)',borderBottom:'1.5px solid var(--border)'}}>
                        <th style={{textAlign:'left',padding:'8px 16px',fontWeight:600,color:'var(--text)'}}>Critère</th>
                        <th style={{textAlign:'center',padding:'8px',fontWeight:600,color:'var(--text)',width:70}}>Coef.</th>
                        <th style={{textAlign:'center',padding:'8px',fontWeight:600,color:'var(--text)',width:80}}>Ma note</th>
                        <th style={{textAlign:'right',padding:'8px 16px',fontWeight:600,color:'var(--text)',width:80}}>Points</th>
                      </tr>
                    </thead>
                    <tbody>
                      {GRILLE.map((g,i)=>{
                        const note=pn(scores[i]);
                        const pts=note*g.coef;
                        return(
                          <tr key={i} style={{borderBottom:'1px solid var(--border)',background:i%2?'var(--bg3)':'var(--bg2)'}}>
                            <td style={{padding:'10px 16px'}}>
                              <div style={{fontWeight:600,color:'var(--text)',fontSize:13}}>{g.c}</div>
                              <div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>{g.d}</div>
                            </td>
                            <td style={{textAlign:'center',padding:'10px 8px'}}>
                              <span style={{background:'rgba(233,164,32,.15)',color:'#92400e',padding:'2px 10px',borderRadius:20,fontWeight:700,fontSize:12}}>×{g.coef}</span>
                            </td>
                            <td style={{textAlign:'center',padding:'8px'}}>
                              <input type="number" min="0" max="20" step="0.5"
                                value={scores[i]||''}
                                onChange={e=>setData(p=>({...p,grille:{...p.grille,[i]:Math.min(20,Math.max(0,parseFloat(e.target.value)||0))}}))}
                                style={{width:60,textAlign:'center',fontSize:14,fontWeight:700,border:'1.5px solid var(--border)',borderRadius:8,padding:'5px',color:'#e9a420',background:'var(--bg2)',outline:'none'}}/>
                            </td>
                            <td style={{textAlign:'right',padding:'10px 16px',fontWeight:700,color:note>=12?'#16a34a':note>=8?'#d97706':'#dc2626',fontSize:14}}>
                              {note>0?pts.toFixed(1):'-'}
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                  <div style={{padding:'16px 20px',background:'var(--bg3)',borderTop:'2px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:12}}>
                    <div>
                      <div style={{fontSize:12,color:'var(--text3)'}}>Note simulée finale</div>
                      <div className="font-display" style={{fontSize:36,fontWeight:700,color:parseFloat(noteFin)>=12?'#16a34a':parseFloat(noteFin)>=8?'#d97706':'#dc2626'}}>{noteFin}/20</div>
                    </div>
                    <div style={{textAlign:'right'}}>
                      <div style={{fontSize:12,color:'var(--text3)'}}>Mention</div>
                      <div style={{fontSize:18,fontWeight:700,color:'var(--text)'}}>
                        {parseFloat(noteFin)>=16?'🏆 Très Bien':parseFloat(noteFin)>=14?'✅ Bien':parseFloat(noteFin)>=12?'✔️ Assez Bien':parseFloat(noteFin)>=10?'📘 Passable':'⚠️ Insuffisant'}
                      </div>
                    </div>
                    <div style={{width:'100%',height:8,background:'var(--border2)',borderRadius:4}}>
                      <div style={{height:'100%',width:`${parseFloat(noteFin)/20*100}%`,background:parseFloat(noteFin)>=12?'#22c55e':parseFloat(noteFin)>=8?'#f59e0b':'#ef4444',borderRadius:4,transition:'width .5s'}}/>
                    </div>
                  </div>
                </div>
              </>
            );
          })()}
        </div>
      )}

      {tab==='liens'&&(
        <div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:14,marginBottom:20}}>
            {RESOURCES_LINKS.map((r,i)=>(
              <a key={i} href={r.u} target="_blank" rel="noopener noreferrer"
                style={{textDecoration:'none',display:'block'}}
                className="card card-hover">
                <div style={{padding:'14px 16px',display:'flex',alignItems:'center',gap:12}}>
                  <div style={{width:40,height:40,borderRadius:12,background:`${r.color}18`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0}}>
                    {r.i}
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:13,color:'var(--text)',marginBottom:2}}>{r.t}</div>
                    <div style={{fontSize:12,color:'var(--text3)',lineHeight:1.4}}>{r.d}</div>
                  </div>
                  <span style={{fontSize:14,color:'var(--text4)'}}>↗</span>
                </div>
              </a>
            ))}
          </div>
          <div className="card" style={{padding:20,background:'linear-gradient(135deg,var(--navy) 0%,#1a2f4a 100%)',border:'none'}}>
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
              <span style={{fontSize:24}}>🌱</span>
              <div className="font-display" style={{fontWeight:700,fontSize:17,color:'#fff'}}>Fil Rouge : Projet INSECTEOO</div>
            </div>
            <p style={{fontSize:13,color:'#93c5fd',lineHeight:1.6}}>
              L'entreprise fictive fil rouge du BTS MCO — élevage et commercialisation d'insectes comestibles. 
              Utilisez-la comme référence pour calibrer la profondeur attendue de votre analyse.
            </p>
            <div style={{display:'flex',gap:8,marginTop:12,flexWrap:'wrap'}}>
              {['Innovation ✓','RSE ✓','Digital ✓','B2B & B2C ✓'].map(l=>(
                <span key={l} style={{background:'rgba(233,164,32,.2)',color:'#fde68a',padding:'3px 10px',borderRadius:20,fontSize:11,fontWeight:600}}>{l}</span>
              ))}
            </div>
          </div>
        </div>
      )}

      {tab==='memo'&&(
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          {MEMO.map((sec,i)=>(
            <div key={i} className="card" style={{overflow:'hidden'}}>
              <div style={{padding:'10px 16px',background:['#7c3aed','#0891b2','#059669','#d97706'][i%4],color:'#fff'}}>
                <div className="font-display" style={{fontWeight:700,fontSize:15}}>{sec.title}</div>
              </div>
              <div style={{padding:'8px 12px',display:'flex',flexDirection:'column',gap:2}}>
                {sec.items.map(([t,d])=>(
                  <div key={t} style={{display:'flex',gap:12,padding:'8px 10px',borderRadius:8,alignItems:'flex-start',background:i%2===0?'transparent':'var(--bg3)'}}>
                    <div style={{fontWeight:700,fontSize:13,color:'var(--text)',minWidth:130,flexShrink:0}}>{t}</div>
                    <div style={{fontSize:12,color:'var(--text2)',lineHeight:1.55}}>{d}</div>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════════════════════ */

function Sidebar({active,onNav,prog,dark,toggleDark}){
  const steps=[
    {id:'dashboard',n:1,l:'Mon Avancement',s:'Tableau de bord',col:'#7c3aed'},
    {id:'diagnostic',n:2,l:'Diagnostic',s:'PESTEL · Porter · SWOT',col:'#2563eb'},
    {id:'bmc',n:3,l:'Business Model',s:'Canvas 9 blocs',col:'#0891b2'},
    {id:'finance',n:4,l:'Business Plan',s:'Finance · Moyens · RH',col:'#059669'},
    {id:'ressources',n:5,l:'Examen',s:'Oral · Timer · Grille',col:'#d97706'},
  ];
  return(
    <aside className="no-print sidebar-desktop" style={{width:236,flexShrink:0,background:'#0a1524',height:'100vh',position:'sticky',top:0,display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <div style={{padding:'16px',borderBottom:'1px solid rgba(255,255,255,.08)'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:36,height:36,borderRadius:10,background:'#e9a420',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'Playfair Display,serif',fontWeight:700,color:'#0a1524',fontSize:17}}>B</div>
          <div>
            <div style={{fontFamily:'Playfair Display,serif',fontWeight:700,color:'#fff',fontSize:15,lineHeight:1.2}}>BTS MCO</div>
            <div style={{fontSize:10,color:'#60a5fa',fontWeight:500}}>Entrepreneuriat Pro</div>
          </div>
        </div>
      </div>

      <div style={{padding:'12px 16px',borderBottom:'1px solid rgba(255,255,255,.08)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',fontSize:11,marginBottom:5}}>
          <span style={{color:'#93c5fd'}}>Progression globale</span>
          <span style={{color:'#fff',fontWeight:700,fontFamily:'Playfair Display,serif'}}>{prog}%</span>
        </div>
        <div style={{height:5,background:'rgba(255,255,255,.1)',borderRadius:3}}>
          <div className="progress-anim" style={{height:5,borderRadius:3,background:prog===100?'#22c55e':'#e9a420',width:`${prog}%`}}/>
        </div>
        {prog===100&&<div style={{fontSize:10,color:'#86efac',fontWeight:600,marginTop:5,textAlign:'center',animation:'bounce 1.5s ease infinite'}}>🏆 Projet complet !</div>}
      </div>

      <nav style={{flex:1,padding:'8px',overflowY:'auto',display:'flex',flexDirection:'column',gap:2}}>
        {steps.map(step=>(
          <button key={step.id} onClick={()=>onNav(step.id)}
            className={`nav-item ${active===step.id?'active':''}`}
            style={{background:active===step.id?'rgba(255,255,255,.1)':'transparent'}}>
            <div style={{width:28,height:28,borderRadius:8,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,color:'#fff',background:active===step.id?step.col:'rgba(255,255,255,.08)',transition:'background .15s'}}>{step.n}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:12,fontWeight:600,color:active===step.id?'#fff':'#93c5fd',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{step.l}</div>
              <div style={{fontSize:10,color:'#4b6a8a',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{step.s}</div>
            </div>
            {active===step.id&&<div style={{width:5,height:5,borderRadius:'50%',background:'#e9a420',flexShrink:0}}/>}
          </button>
        ))}
      </nav>

      <div style={{padding:'10px 16px',borderTop:'1px solid rgba(255,255,255,.08)'}}>
        <button onClick={toggleDark}
          style={{width:'100%',padding:'8px 12px',borderRadius:10,background:'rgba(255,255,255,.08)',border:'1px solid rgba(255,255,255,.1)',color:'#93c5fd',cursor:'pointer',fontSize:12,fontWeight:500,display:'flex',alignItems:'center',justifyContent:'center',gap:6,marginBottom:6}}>
          {dark?'☀️ Mode clair':'🌙 Mode sombre'}
        </button>
        <div style={{textAlign:'center'}}>
          <p style={{fontSize:10,color:'#4b6a8a'}}>💾 Sauvegarde automatique</p>
        </div>
      </div>
    </aside>
  );
}

/* ═══════════════════════════════════════════════════════
   APP
═══════════════════════════════════════════════════════ */

function App(){
  const[sec,setSec]=useState('dashboard');
  const[cl,setCl]=useLS('bts_cl',{});
  const[diag,setDiag]=useLS('bts_diag',{pestel:{},porter:{},swot:{},ciblage:{}});
  const[bmc,setBmc]=useLS('bts_bmc',{});
  const[fin,setFin]=useLS('bts_fin',{});
  const[res,setRes]=useLS('bts_res',{});
  const[dark,setDark]=useLS('bts_dark',false);
  const[mobileMenu,setMobileMenu]=useState(false);
  const{toasts,add:addToast,rm:removeToast}=useToasts();

  const[confetti,setConfetti]=useState(false);
  const prevProg=useRef(0);

  const allItems=Object.values(CHECKLIST_DEF).flatMap(c=>c.items);
  const prog=Math.round(allItems.filter(i=>cl[i.id]==='OUI').length/allItems.length*100);

  useEffect(()=>{
    document.body.className=dark?'dark':'';
  },[dark]);

  useEffect(()=>{
    if(prog===100&&prevProg.current<100){
      setConfetti(true);
      setTimeout(()=>setConfetti(false),5000);
    }
    prevProg.current=prog;
  },[prog]);

  const labels={dashboard:'Mon Avancement',diagnostic:'Diagnostic & Stratégie',bmc:'Business Model Canvas',finance:'Business Plan & Finance',ressources:'Ressources & Examen'};

  const navTo=id=>{setSec(id);setMobileMenu(false);};

  const steps=[
    {id:'dashboard',n:1,l:'Mon Avancement',s:'Tableau de bord',col:'#7c3aed'},
    {id:'diagnostic',n:2,l:'Diagnostic',s:'PESTEL · Porter · SWOT',col:'#2563eb'},
    {id:'bmc',n:3,l:'Business Model',s:'Canvas 9 blocs',col:'#0891b2'},
    {id:'finance',n:4,l:'Business Plan',s:'Finance · Moyens · RH',col:'#059669'},
    {id:'ressources',n:5,l:'Examen',s:'Oral · Timer · Grille',col:'#d97706'},
  ];

  return(
    <div style={{display:'flex',height:'100vh',overflow:'hidden',background:'var(--bg)'}}>
      <Confetti active={confetti}/>
      <Toast toasts={toasts} removeToast={removeToast}/>
      <Sidebar active={sec} onNav={navTo} prog={prog} dark={dark} toggleDark={()=>setDark(d=>!d)}/>

      {/* Mobile header */}
      <div className="mobile-header no-print" style={{position:'fixed',top:0,left:0,right:0,height:52,background:'#0a1524',zIndex:100,padding:'0 16px',alignItems:'center',justifyContent:'space-between'}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <div style={{width:28,height:28,borderRadius:8,background:'#e9a420',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'Playfair Display,serif',fontWeight:700,color:'#0a1524',fontSize:13}}>B</div>
          <span style={{color:'#fff',fontWeight:700,fontSize:14,fontFamily:'Playfair Display,serif'}}>BTS MCO Pro</span>
        </div>
        <button onClick={()=>setMobileMenu(m=>!m)} style={{background:'rgba(255,255,255,.1)',border:'none',color:'#fff',padding:'5px 10px',borderRadius:8,cursor:'pointer',fontSize:14}}>
          {mobileMenu?'✕':'☰'}
        </button>
      </div>

      {mobileMenu&&(
        <div style={{position:'fixed',top:52,left:0,right:0,bottom:0,background:'#0a1524',zIndex:99,padding:'8px',overflowY:'auto',display:'flex',flexDirection:'column',gap:2}}>
          {steps.map(step=>(
            <button key={step.id} onClick={()=>navTo(step.id)}
              className={`nav-item ${sec===step.id?'active':''}`}
              style={{background:sec===step.id?'rgba(255,255,255,.1)':'transparent'}}>
              <div style={{width:28,height:28,borderRadius:8,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,color:'#fff',background:sec===step.id?step.col:'rgba(255,255,255,.08)'}}>{step.n}</div>
              <div><div style={{fontSize:14,fontWeight:600,color:'#fff'}}>{step.l}</div><div style={{fontSize:11,color:'#4b6a8a'}}>{step.s}</div></div>
            </button>
          ))}
        </div>
      )}

      <main style={{flex:1,overflowY:'auto',paddingTop:0}}>
        <div style={{maxWidth:1060,margin:'0 auto',padding:'20px 24px 80px'}}>
          {/* Topbar */}
          <div className="no-print" style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:24,flexWrap:'wrap',gap:10}}>
            <div style={{display:'flex',alignItems:'center',gap:6,fontSize:12,color:'var(--text3)'}}>
              <span>BTS MCO Entrepreneuriat</span>
              <span>›</span>
              <span style={{color:'var(--text)',fontWeight:600}}>{labels[sec]}</span>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <div style={{background:'rgba(233,164,32,.15)',color:'#92400e',padding:'4px 12px',borderRadius:20,fontSize:11,fontWeight:700}}>
                {prog}% complété
              </div>
              <button onClick={()=>window.print()}
                style={{fontSize:11,color:'var(--text3)',padding:'5px 12px',border:'1.5px solid var(--border)',borderRadius:8,background:'var(--bg2)',cursor:'pointer'}}>
                🖨️ Imprimer
              </button>
            </div>
          </div>

          {/* Sections */}
          {sec==='dashboard'&&<Dashboard cl={cl} setCl={setCl} toast={addToast}/>}
          {sec==='diagnostic'&&<DiagnosticModule data={diag} setData={setDiag}/>}
          {sec==='bmc'&&<BMCModule data={bmc} setData={setBmc}/>}
          {sec==='finance'&&<FinanceModule data={fin} setData={setFin}/>}
          {sec==='ressources'&&<ResourcesModule data={res} setData={setRes} finData={fin}/>}
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
