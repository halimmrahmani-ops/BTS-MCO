function useLS(key,init){
  const[val,setVal]=useState(()=>{try{const s=localStorage.getItem(key);return s?JSON.parse(s):init;}catch{return init;}});
  useEffect(()=>{try{localStorage.setItem(key,JSON.stringify(val));}catch{}},[key,val]);
  return[val,setVal];
}
function fmt(n){const v=parseFloat(String(n||'').replace(/\s/g,'').replace(',','.'))||0;return v.toLocaleString('fr-FR',{maximumFractionDigits:0});}
function pn(n){return parseFloat(String(n||'').replace(/\s/g,'').replace(',','.'))||0;}
function fmtTime(s){const m=Math.floor(s/60),sec=s%60;return`${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;}

function useToasts(){
  const[toasts,setToasts]=useState([]);
  const add=useCallback((msg,type='info',dur=3000)=>{const id=Date.now();setToasts(p=>[...p,{id,msg,type}]);setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),dur);},[]);
  const rm=useCallback(id=>setToasts(p=>p.filter(t=>t.id!==id)),[]);
  return{toasts,add,rm};
}

function Confetti({active}){
  if(!active)return null;
  const pieces=Array.from({length:80},(_,i)=>({id:i,color:['#e9a420','#f5c55a','#22c55e','#3b82f6','#a78bfa','#f43f5e'][i%6],left:Math.random()*100,delay:Math.random()*2,duration:2.5+Math.random()*2,size:6+Math.random()*8,shape:Math.random()>.5?'circle':'square'}));
  return(<div style={{position:'fixed',top:0,left:0,width:'100%',height:'100%',pointerEvents:'none',zIndex:9999,overflow:'hidden'}}>{pieces.map(p=>(<div key={p.id} className="confetti-piece" style={{left:`${p.left}%`,width:p.size,height:p.size,backgroundColor:p.color,borderRadius:p.shape==='circle'?'50%':'2px',animation:`confettiFall ${p.duration}s ${p.delay}s ease-in forwards`}}/>))}</div>);
}

function Toast({toasts,removeToast}){
  return(<div style={{position:'fixed',bottom:24,right:24,display:'flex',flexDirection:'column',gap:8,zIndex:8888,pointerEvents:'none'}}>{toasts.map(t=>(<div key={t.id} className="toast-enter" onClick={()=>removeToast(t.id)} style={{background:t.type==='success'?'#166534':t.type==='error'?'#991b1b':'#0f1c2d',color:'#fff',padding:'10px 16px',borderRadius:12,fontSize:13,fontWeight:500,minWidth:220,boxShadow:'0 4px 16px rgba(0,0,0,.25)',display:'flex',alignItems:'center',gap:8,pointerEvents:'auto',cursor:'pointer'}}><span style={{fontSize:16}}>{t.type==='success'?'✅':'💬'}</span>{t.msg}</div>))}</div>);
}

function ProgressRing({pct,size=80,sw=7,color='#e9a420'}){
  const r=(size-sw*2)/2,c=2*Math.PI*r,d=(pct/100)*c;
  return(<svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}><circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--border2)" strokeWidth={sw}/><circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={sw} strokeDasharray={`${d} ${c}`} strokeLinecap="round" transform={`rotate(-90 ${size/2} ${size/2})`} style={{transition:'stroke-dasharray .6s ease'}}/><text x={size/2} y={size/2} textAnchor="middle" dominantBaseline="middle" fontSize={size*.21} fontWeight="700" fill={color} fontFamily="Playfair Display,serif">{pct}%</text></svg>);
}

function RadarChart({data}){
  const S=240,cx=S/2,cy=S/2,R=80,n=data.length;
  const pt=(i,r)=>({x:cx+r*Math.cos(2*Math.PI*i/n-Math.PI/2),y:cy+r*Math.sin(2*Math.PI*i/n-Math.PI/2)});
  const dpts=data.map((d,i)=>pt(i,R*(d.v/10)));
  const path=dpts.map((p,i)=>`${i?'L':'M'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ')+'Z';
  const avg=(data.reduce((s,d)=>s+d.v,0)/data.length).toFixed(1);
  return(<div style={{textAlign:'center'}}><svg viewBox={`0 0 ${S} ${S}`} style={{width:'100%',maxWidth:220}}>{[.25,.5,.75,1].map(l=>(<polygon key={l} points={Array.from({length:n},(_,i)=>{const p=pt(i,R*l);return`${p.x.toFixed(1)},${p.y.toFixed(1)}`;}).join(' ')} fill="none" stroke="var(--border)" strokeWidth="1"/>))}{Array.from({length:n},(_,i)=>{const p=pt(i,R);return<line key={i} x1={cx} y1={cy} x2={p.x} y2={p.y} stroke="var(--border)" strokeWidth="1"/>;})} <path d={path} fill="rgba(233,164,32,.18)" stroke="#e9a420" strokeWidth="2.5"/>{dpts.map((p,i)=><circle key={i} cx={p.x} cy={p.y} r="4" fill="#e9a420" stroke="var(--bg2)" strokeWidth="2"/>)}{data.map((d,i)=>{const p=pt(i,R+22);return<text key={i} x={p.x} y={p.y} textAnchor="middle" dominantBaseline="middle" fontSize="10" fill="var(--text2)" fontFamily="DM Sans,sans-serif" fontWeight="600">{d.abbr}</text>;})}</svg><div style={{fontSize:12,color:'var(--text3)',marginTop:2}}>Intensité moy. : <strong style={{color:avg>7?'#ef4444':avg>5?'#f59e0b':'#22c55e'}}>{avg}/10</strong></div></div>);
}

function MiniBar({data,color='#e9a420',height=55}){
  const max=Math.max(...data.map(d=>Math.abs(d.v)),1);
  return(<div style={{display:'flex',alignItems:'flex-end',gap:4,height,width:'100%'}}>{data.map((d,i)=>(<div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:2}}><div style={{width:'100%',height:Math.abs(d.v)/max*height,background:d.v>=0?color:'#ef4444',borderRadius:'3px 3px 0 0',transition:'height .5s ease',minHeight:2}}/><div style={{fontSize:8,color:'var(--text4)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:'100%'}}>{d.l}</div></div>))}</div>);
}

          {k:'accroche',l:'🎣 Accroche d\'ouverture',ph:"Commencez par un chiffre marquant, une question, une anecdote... Ex : « Saviez-vous que 30% de la nourriture produite est gaspillée ? »"},
          {k:'probleme',l:'🔍 Problème identifié',ph:"Quel problème concret résolvez-vous ? Ex : « Les entrepreneurs perdent 3h par jour en tâches administratives. »"},
          {k:'solution',l:'💡 Votre solution',ph:"Expliquez votre offre simplement, en une phrase. Ex : « Une appli qui automatise la compta en temps réel. »"},
          {k:'marche',l:'🎯 Votre marché cible',ph:"Qui sont vos clients ? Donnez un chiffre. Ex : « 2,5 millions de TPE en France. »"},
          {k:'diff',l:'⚡ Votre différenciation',ph:"Pourquoi vous et pas un autre ? Ex : « Seul outil certifié expert-comptable et intégré à France Connect. »"},

      </div>
    </div>

/* ══════════════════════════════════════════════
   CALCULATEUR DE PRIX
══════════════════════════════════════════════ */
function CalculateurPrix({data,setData}){
  const up=(k,v)=>setData(p=>({...p,prix:{...p.prix,[k]:v}}));
  const d=data.prix||{};
  const pn2=k=>parseFloat(d[k])||0;

  const coutRevient=pn2('mat')+pn2('main_oeuvre')+pn2('charges_ind')+pn2('emballage')+pn2('transport');
  const margeSouhaitee=pn2('marge_pct');
  const prixHT=margeSouhaitee>0&&margeSouhaitee<100?coutRevient/(1-margeSouhaitee/100):coutRevient;
  const tva=pn2('tva_pct');
  const prixTTC=prixHT*(1+tva/100);
  const margeEuros=prixHT-coutRevient;
  const tauxMarge=prixHT>0?(margeEuros/prixHT*100):0;
  const tauxMarque=coutRevient>0?(margeEuros/coutRevient*100):0;

  const Field=({k,l,ph,suffix='€'})=>(<div><label style={{display:'block',fontSize:12,fontWeight:600,color:'var(--text)',marginBottom:4}}>{l}</label><div style={{display:'flex',alignItems:'center',gap:6}}><input type="number" value={d[k]||''} onChange={e=>up(k,e.target.value)} placeholder={ph||'0'} style={{flex:1,padding:'8px 12px',border:'1.5px solid var(--border)',borderRadius:8,fontSize:13,color:'var(--text)',background:'var(--bg2)'}}/><span style={{fontSize:12,color:'var(--text3)',flexShrink:0}}>{suffix}</span></div></div>);

  return(<div style={{display:'flex',flexDirection:'column',gap:16}}>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
      <div className="card" style={{padding:20}}>
        <div className="font-display" style={{fontWeight:700,fontSize:16,color:'var(--text)',marginBottom:14}}>📦 Coûts de Revient</div>
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          <Field k="mat" l="Matières premières / Achats"/>
          <Field k="main_oeuvre" l="Main d'œuvre directe"/>
          <Field k="charges_ind" l="Charges indirectes (loyer, énergie...)"/>
          <Field k="emballage" l="Emballage / Packaging"/>
          <Field k="transport" l="Transport / Livraison"/>
          <div style={{borderTop:'2px solid var(--navy)',paddingTop:10,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontWeight:700,color:'var(--text)'}}>Coût de revient total</span>
            <span className="font-display" style={{fontSize:20,fontWeight:700,color:'#ef4444'}}>{fmt(coutRevient)} €</span>
          </div>
        </div>
      </div>
      <div className="card" style={{padding:20}}>
        <div className="font-display" style={{fontWeight:700,fontSize:16,color:'var(--text)',marginBottom:14}}>💹 Paramètres de Prix</div>
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          <Field k="marge_pct" l="Taux de marge souhaité" suffix="%"/>
          <Field k="tva_pct" l="Taux de TVA" ph="20" suffix="%"/>
          <div style={{borderTop:'1px solid var(--border)',paddingTop:10}}>
            <label style={{display:'block',fontSize:12,fontWeight:600,color:'var(--text)',marginBottom:5}}>Prix du concurrent principal (€)</label>
            <input type="number" value={d.prix_concurrent||''} onChange={e=>up('prix_concurrent',e.target.value)} placeholder="0" style={{width:'100%',padding:'8px 12px',border:'1.5px solid var(--border)',borderRadius:8,fontSize:13,color:'var(--text)',background:'var(--bg2)'}}/>
          </div>
          <div>
            <label style={{display:'block',fontSize:12,fontWeight:600,color:'var(--text)',marginBottom:5}}>Nom du produit / service</label>
            <input type="text" value={d.nom_produit||''} onChange={e=>up('nom_produit',e.target.value)} placeholder="Ex : Menu dégustation insectes" style={{width:'100%',padding:'8px 12px',border:'1.5px solid var(--border)',borderRadius:8,fontSize:13,color:'var(--text)',background:'var(--bg2)'}}/>
          </div>
        </div>
      </div>
    </div>

    {/* Résultats */}
    <div className="card" style={{overflow:'hidden'}}>
      <div style={{padding:'14px 20px',background:'linear-gradient(135deg,#0f1c2d,#1a2f4a)'}}>
        <div className="font-display" style={{fontWeight:700,fontSize:17,color:'#fff'}}>📊 Résultats — {d.nom_produit||'Votre produit'}</div>
      </div>
      <div style={{padding:20}}>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(160px,1fr))',gap:12,marginBottom:16}}>
          {[
            {l:'Prix de vente HT',v:fmt(prixHT)+' €',c:'#7c3aed',i:'🏷️'},
            {l:'Prix de vente TTC',v:fmt(prixTTC)+' €',c:'#0891b2',i:'💳'},
            {l:'Marge brute',v:fmt(margeEuros)+' €',c:margeEuros>=0?'#16a34a':'#dc2626',i:'💰'},
            {l:'Taux de marge',v:tauxMarge.toFixed(1)+'%',c:'#d97706',i:'📈'},
            {l:'Taux de marque',v:tauxMarque.toFixed(1)+'%',c:'#e9a420',i:'📊'},
          ].map((m,i)=>(<div key={i} style={{textAlign:'center',padding:'12px 8px',background:'var(--bg3)',borderRadius:12,border:'1.5px solid var(--border)'}}><div style={{fontSize:20,marginBottom:4}}>{m.i}</div><div className="font-display" style={{fontSize:18,fontWeight:700,color:m.c}}>{m.v}</div><div style={{fontSize:10,color:'var(--text4)',marginTop:2}}>{m.l}</div></div>))}
        </div>

        {/* Comparaison concurrent */}
        {d.prix_concurrent&&(<div style={{background:'var(--bg3)',borderRadius:10,padding:'12px 16px',border:'1px solid var(--border)',marginBottom:12}}>
          <div style={{fontSize:12,fontWeight:700,color:'var(--text)',marginBottom:6}}>⚡ Comparaison avec le concurrent</div>
          <div style={{display:'flex',gap:16,flexWrap:'wrap'}}>
            <div style={{fontSize:13,color:'var(--text2)'}}>Votre prix TTC : <strong style={{color:'var(--text)'}}>{fmt(prixTTC)} €</strong></div>
            <div style={{fontSize:13,color:'var(--text2)'}}>Prix concurrent : <strong style={{color:'var(--text)'}}>{fmt(d.prix_concurrent)} €</strong></div>
            <div style={{fontSize:13,fontWeight:700,color:prixTTC<=pn2('prix_concurrent')?'#16a34a':'#d97706'}}>
              {prixTTC<=pn2('prix_concurrent')?`✅ Vous êtes ${fmt(pn2('prix_concurrent')-prixTTC)}€ moins cher`:`⚠️ Vous êtes ${fmt(prixTTC-pn2('prix_concurrent'))}€ plus cher`}
            </div>
          </div>
        </div>)}

        {/* Visualisation */}
        <div style={{height:8,background:'var(--border2)',borderRadius:4,overflow:'hidden',marginBottom:4}}>
          <div style={{height:'100%',width:`${Math.min(100,tauxMarge)}%`,background:tauxMarge>=30?'#22c55e':tauxMarge>=15?'#f59e0b':'#ef4444',borderRadius:4,transition:'width .5s'}}/>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'var(--text4)'}}>
          <span>Marge faible &lt;15%</span><span>Bonne marge ≥30%</span>
        </div>
      </div>
    </div>
  </div>);
}

/* ══════════════════════════════════════════════
   RÉTROPLANNING
══════════════════════════════════════════════ */
function Retroplanning({data,setData}){
  const up=(k,v)=>setData(p=>({...p,retro:{...p.retro,[k]:v}}));
  const rd=data.retro||{};

  const ETAPES=[
    {id:'date_exam',l:"📅 Date de l'examen",type:'date',default:''},
    {id:'date_depot',l:"📁 Date de dépôt du dossier",type:'date'},
    {id:'date_oral_blanc',l:"🎤 Oral blanc prévu",type:'date'},
  ];

  const today=new Date();
  const examDate=rd.date_exam?new Date(rd.date_exam):null;
  const daysLeft=examDate?Math.ceil((examDate-today)/(1000*60*60*24)):null;

  const TASKS=[
    {id:'t1',l:'Choisir et formaliser l\'idée de projet',phase:'Démarrage'},
    {id:'t2',l:'Réaliser l\'analyse PESTEL',phase:'Démarrage'},
    {id:'t3',l:'Analyser les 5 Forces de Porter',phase:'Démarrage'},
    {id:'t4',l:'Compléter la matrice SWOT',phase:'Démarrage'},
    {id:'t5',l:'Définir la segmentation et le ciblage',phase:'Stratégie'},
    {id:'t6',l:'Remplir le Business Model Canvas',phase:'Stratégie'},
    {id:'t7',l:'Choisir la forme juridique',phase:'Business Plan'},
    {id:'t8',l:'Réaliser le plan de financement',phase:'Business Plan'},
    {id:'t9',l:'Réaliser le compte de résultat 3 ans',phase:'Business Plan'},
    {id:'t10',l:'Réaliser le plan de trésorerie',phase:'Business Plan'},
    {id:'t11',l:'Définir les moyens de production et RH',phase:'Business Plan'},
    {id:'t12',l:'Rédiger et mettre en forme le dossier',phase:'Finalisation'},
    {id:'t13',l:'Relire et corriger le dossier',phase:'Finalisation'},
    {id:'t14',l:'Préparer la présentation orale 10 min',phase:'Préparation oral'},
    {id:'t15',l:'Préparer les réponses aux questions',phase:'Préparation oral'},
    {id:'t16',l:'Faire un oral blanc complet',phase:'Préparation oral'},
    {id:'t17',l:'Mémoriser les chiffres clés',phase:'Préparation oral'},
    {id:'t18',l:'Vérifier les critères Annexe 19',phase:'Finalisation'},
  ];

  const phases=['Démarrage','Stratégie','Business Plan','Finalisation','Préparation oral'];
  const phaseColors={'Démarrage':'#7c3aed','Stratégie':'#0891b2','Business Plan':'#059669','Finalisation':'#d97706','Préparation oral':'#e9a420'};

  const done=TASKS.filter(t=>rd[t.id]==='done').length;
  const pct=Math.round(done/TASKS.length*100);

  return(<div style={{display:'flex',flexDirection:'column',gap:16}}>
    {/* Dates clés */}
    <div className="card" style={{padding:20}}>
      <div className="font-display" style={{fontWeight:700,fontSize:17,color:'var(--text)',marginBottom:14}}>📅 Dates Clés</div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(220px,1fr))',gap:12}}>
        {ETAPES.map(e=>(<div key={e.id}><label style={{display:'block',fontSize:12,fontWeight:700,color:'var(--text)',marginBottom:5}}>{e.l}</label><input type="date" value={rd[e.id]||''} onChange={ev=>up(e.id,ev.target.value)} style={{width:'100%',padding:'9px 12px',border:'1.5px solid var(--border)',borderRadius:8,fontSize:13,color:'var(--text)',background:'var(--bg2)'}}/></div>))}
      </div>
      {daysLeft!==null&&(
        <div style={{marginTop:14,padding:'14px 20px',borderRadius:12,background:daysLeft<30?'rgba(239,68,68,.1)':daysLeft<60?'rgba(245,158,11,.1)':'rgba(34,197,94,.1)',border:`1.5px solid ${daysLeft<30?'#fca5a5':daysLeft<60?'#fde68a':'#86efac'}`,textAlign:'center'}}>
          <div className="font-display" style={{fontSize:28,fontWeight:700,color:daysLeft<30?'#dc2626':daysLeft<60?'#d97706':'#16a34a'}}>{daysLeft} jours</div>
          <div style={{fontSize:13,color:'var(--text2)',marginTop:2}}>avant l'examen — {daysLeft<30?'🔥 Sprint final !':daysLeft<60?'⚡ Accélérez !':'✅ Bon rythme possible'}</div>
        </div>
      )}
    </div>

    {/* Checklist tâches */}
    <div className="card" style={{overflow:'hidden'}}>
      <div style={{padding:'14px 20px',background:'var(--navy)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div><div className="font-display" style={{fontWeight:700,fontSize:16,color:'#fff'}}>📋 Tâches à accomplir</div><p style={{fontSize:11,color:'#93c5fd',marginTop:1}}>{done}/{TASKS.length} tâches terminées</p></div>
        <div style={{width:60,height:60}}><ProgressRing pct={pct} size={60} sw={5} color="#e9a420"/></div>
      </div>
      <div style={{padding:'12px 16px'}}>
        {phases.map(phase=>{
          const tasks=TASKS.filter(t=>t.phase===phase);
          const phaseDone=tasks.filter(t=>rd[t.id]==='done').length;
          return(<div key={phase} style={{marginBottom:16}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
              <div style={{width:10,height:10,borderRadius:2,background:phaseColors[phase]}}/>
              <span style={{fontSize:11,fontWeight:700,color:phaseColors[phase],textTransform:'uppercase',letterSpacing:'.05em'}}>{phase}</span>
              <span style={{fontSize:10,color:'var(--text4)',marginLeft:'auto'}}>{phaseDone}/{tasks.length}</span>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:4}}>
              {tasks.map(t=>(<div key={t.id} onClick={()=>up(t.id,rd[t.id]==='done'?'':  'done')} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 12px',borderRadius:8,background:rd[t.id]==='done'?'rgba(34,197,94,.08)':'var(--bg3)',cursor:'pointer',transition:'background .15s'}}>
                <div style={{width:20,height:20,borderRadius:6,border:`2px solid ${rd[t.id]==='done'?'#22c55e':'var(--border)'}`,background:rd[t.id]==='done'?'#22c55e':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,transition:'all .2s'}}>
                  {rd[t.id]==='done'&&<span style={{color:'#fff',fontSize:11,fontWeight:700}}>✓</span>}
                </div>
                <span style={{fontSize:12,color:rd[t.id]==='done'?'var(--text4)':'var(--text)',textDecoration:rd[t.id]==='done'?'line-through':'none'}}>{t.l}</span>
                {rd[t.id]==='done'&&<span style={{marginLeft:'auto',fontSize:9,color:'#22c55e',fontWeight:700}}>FAIT</span>}
              </div>))}
            </div>
          </div>);
        })}
      </div>
    </div>
  </div>);
}

  const[search,setSearch]=useState('');

  return(<div>
    <div style={{position:'relative',marginBottom:16}}>
      <span style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',fontSize:15}}>🔍</span>
      <input type="text" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Rechercher un terme..." style={{width:'100%',padding:'10px 12px 10px 38px',border:'1.5px solid var(--border)',borderRadius:12,fontSize:13,color:'var(--text)',background:'var(--bg2)'}}/>
    </div>
    <div style={{display:'flex',flexDirection:'column',gap:8}}>
      {filtered.map((g,i)=>(<div key={i} className="card card-hover" style={{padding:'14px 18px',borderLeft:'4px solid #e9a420'}}>
        <div className="font-display" style={{fontWeight:700,fontSize:14,color:'var(--text)',marginBottom:5}}>{g.t}</div>
        <div style={{fontSize:13,color:'var(--text2)',lineHeight:1.6}}>{g.d}</div>
      </div>))}
      {filtered.length===0&&<div style={{textAlign:'center',padding:32,color:'var(--text4)',fontSize:13}}>Aucun résultat pour "{search}"</div>}
    </div>
  </div>);
}

/* ══════════════════════════════════════════════
   DASHBOARD
══════════════════════════════════════════════ */
function Dashboard({cl,setCl,toast}){
  const allItems=Object.values(CHECKLIST_DEF).flatMap(c=>c.items);
  const oui=allItems.filter(i=>cl[i.id]==='OUI').length;
  const cours=allItems.filter(i=>cl[i.id]==='EN COURS').length;
  const pct=Math.round(oui/allItems.length*100);
  const catPct=key=>Math.round(CHECKLIST_DEF[key].items.filter(i=>cl[i.id]==='OUI').length/CHECKLIST_DEF[key].items.length*100);
  const catColors={businessModel:'#7c3aed',businessPlan:'#0891b2',examen:'#d97706'};
  const prevPct=useRef(pct);
  useEffect(()=>{
    if(pct===100&&prevPct.current<100)toast('🏆 Félicitations ! Votre projet est prêt pour l\'examen !','success',5000);
    else if(pct>0&&pct%25===0&&prevPct.current<pct)toast(`✨ ${pct}% complété — continuez !`,'success');
    prevPct.current=pct;
  },[pct]);
  const BADGES=[{l:'Premier pas',icon:'🌱',done:oui>=1},{l:'Mi-chemin',icon:'⚡',done:pct>=50},{l:'Presque prêt',icon:'🔥',done:pct>=75},{l:'Projet complet',icon:'🏆',done:pct===100}];
  return(<div className="section-enter">
    <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:20,flexWrap:'wrap',gap:12}}>
      <div><h1 className="font-display" style={{fontSize:28,fontWeight:700,color:'var(--text)',marginBottom:4}}>Mon Avancement</h1><p style={{color:'var(--text3)',fontSize:13}}>Tableau de bord de préparation à l'épreuve d'entrepreneuriat</p></div>
      <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>{BADGES.map((b,i)=>(<div key={i} style={{display:'flex',alignItems:'center',gap:4,padding:'5px 10px',borderRadius:20,fontSize:11,fontWeight:600,background:b.done?'#fef3c7':'var(--bg3)',color:b.done?'#92400e':'var(--text4)',border:`1.5px solid ${b.done?'#fde68a':'var(--border)'}`,filter:b.done?'none':'grayscale(.8) opacity(.5)',transition:'all .3s'}}><span>{b.icon}</span>{b.l}</div>))}</div>
    </div>
    <div className="card" style={{padding:'20px 24px',marginBottom:20,background:'linear-gradient(135deg,#0a1524 0%,#1a2f4a 100%)',border:'none'}}>
      <div style={{display:'flex',alignItems:'center',gap:24,flexWrap:'wrap'}}>
        <ProgressRing pct={pct} size={100} sw={9} color={pct>=100?'#22c55e':pct>=50?'#e9a420':'#f97316'}/>
        <div style={{flex:1}}>
          <div style={{fontSize:11,color:'#93c5fd',fontWeight:600,textTransform:'uppercase',letterSpacing:'.05em',marginBottom:3}}>Progression globale</div>
          <div className="font-display" style={{fontSize:22,fontWeight:700,color:'#fff',marginBottom:8}}>{pct===0?'🚀 Commençons !':pct<50?'⚡ En démarrage':pct<75?'🔥 Bonne progression':pct<100?'💪 Bientôt prêt !':'🏆 Projet complet !'}</div>
          <div style={{display:'flex',gap:14,flexWrap:'wrap'}}>
            {[{c:'#22c55e',t:`${oui} terminées`},{c:'#f59e0b',t:`${cours} en cours`},{c:'#6b7280',t:`${allItems.length-oui-cours} à démarrer`}].map((s,i)=>(<div key={i} style={{display:'flex',alignItems:'center',gap:5}}><div style={{width:8,height:8,borderRadius:'50%',background:s.c}}/><span style={{fontSize:12,color:'#93c5fd'}}>{s.t}</span></div>))}
          </div>
        </div>
        <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>{Object.entries(catColors).map(([key,col])=>(<div key={key} style={{textAlign:'center',padding:'8px 14px',background:'rgba(255,255,255,.08)',borderRadius:12}}><div style={{fontSize:18,marginBottom:2}}>{CHECKLIST_DEF[key].icon}</div><div className="font-display" style={{fontSize:20,fontWeight:700,color:col}}>{catPct(key)}%</div><div style={{fontSize:10,color:'#6b7280'}}>{CHECKLIST_DEF[key].title}</div></div>))}</div>
      </div>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:16}}>
      {Object.entries(CHECKLIST_DEF).map(([key,cat])=>{
        const p=catPct(key),col=catColors[key];
        return(<div key={key} className="card" style={{overflow:'hidden'}}>
          <div style={{padding:'13px 18px',background:`${col}14`,borderBottom:'1.5px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div style={{display:'flex',alignItems:'center',gap:8}}><span style={{fontSize:19}}>{cat.icon}</span><div><div className="font-display" style={{fontWeight:700,fontSize:13,color:'var(--text)'}}>{cat.title}</div><div style={{width:80,height:4,background:'var(--border2)',borderRadius:4,marginTop:3}}><div className="progress-anim" style={{height:4,borderRadius:4,background:col,width:`${p}%`}}/></div></div></div>

  const upTr=(m,k,v)=>setData(p=>({...p,tr:{...p.tr,[m]:{...p.tr?.[m],[k]:v}}}));
  const upTxt=(k,v)=>setData(p=>({...p,[k]:v}));
  const gF=(t,k)=>pn(data.fin?.[t]?.[k]);
  const gC=(y,k)=>pn(data.cr?.[y]?.[k]);
  const gT=(m,k)=>pn(data.tr?.[m]?.[k]);

    </div>):(<div style={{textAlign:'center',padding:32,color:'var(--text4)'}}><div style={{fontSize:40,marginBottom:8}}>💡</div><p style={{fontSize:13}}>Remplissez votre Compte de Résultat (CA, Achats, Charges fixes) pour calculer automatiquement votre seuil de rentabilité.</p></div>);

/* ══════════════════════════════════════════════
   TIMER ORAL
══════════════════════════════════════════════ */
function OralTimer(){
  const[phase,setPhase]=useState('idle');const[elapsed,setElapsed]=useState(0);const[totalPres,setTotalPres]=useState(0);const interval=useRef(null);const PRES=600,QUEST=600;
  const curLimit=phase==='presentation'?PRES:phase==='questions'?QUEST:0;const remaining=curLimit>0?curLimit-elapsed:0;const pct=curLimit>0?Math.min(100,(elapsed/curLimit)*100):0;
  useEffect(()=>{if(phase==='presentation'||phase==='questions'){interval.current=setInterval(()=>{setElapsed(e=>{if(e+1>=curLimit){clearInterval(interval.current);if(phase==='presentation'){setPhase('pause');setTotalPres(e+1);}else setPhase('done');return e+1;}return e+1;});},1000);}return()=>clearInterval(interval.current);},[phase]);
  const ringColor=remaining<60?'#ef4444':remaining<120?'#f59e0b':'#22c55e';const urgent=remaining<60&&(phase==='presentation'||phase==='questions');
  return(<div className="card" style={{padding:24,textAlign:'center',animation:urgent?'pulseGold 1s ease infinite':'none'}}>
    <div className="font-display" style={{fontWeight:700,fontSize:18,color:'var(--text)',marginBottom:4}}>⏱️ Chronomètre Oral Officiel</div>
    <p style={{fontSize:12,color:'var(--text3)',marginBottom:18}}>10 min présentation + 10 min questions jury</p>
    <div style={{display:'flex',gap:8,justifyContent:'center',marginBottom:18}}>
      {['Présentation','Transition','Questions'].map((l,i)=>{const done=(i===0&&['pause','questions','done'].includes(phase))||(i===1&&['questions','done'].includes(phase))||(i===2&&phase==='done');const active=(i===0&&phase==='presentation')||(i===1&&phase==='pause')||(i===2&&phase==='questions');return(<div key={i} style={{display:'flex',alignItems:'center',gap:4}}><div style={{width:26,height:26,borderRadius:'50%',fontSize:11,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',background:done?'#22c55e':active?'#e9a420':'var(--border2)',color:done||active?'#fff':'var(--text4)',transition:'all .3s'}}>{done?'✓':i+1}</div><span style={{fontSize:11,fontWeight:500,color:active?'var(--text)':'var(--text4)'}}>{l}</span>{i<2&&<div style={{width:16,height:2,background:'var(--border2)',borderRadius:2}}/>}</div>);})}
    </div>
    <div style={{display:'inline-block',marginBottom:14}}><ProgressRing pct={Math.round(pct)} size={130} sw={9} color={phase==='idle'?'var(--border2)':ringColor}/></div>
    {(phase==='presentation'||phase==='questions')&&<div style={{fontSize:36,fontWeight:700,color:ringColor,fontVariantNumeric:'tabular-nums',marginBottom:8,letterSpacing:2}}>{fmtTime(remaining)}</div>}
    {phase==='idle'&&<p style={{color:'var(--text3)',fontSize:13,marginBottom:14}}>Prêt(e) pour votre simulation d'oral ?</p>}
    {phase==='pause'&&(<div style={{background:'#fef3c7',border:'1.5px solid #fde68a',borderRadius:12,padding:'12px 16px',marginBottom:12}}><div style={{fontWeight:700,color:'#92400e'}}>🔔 Présentation terminée ! Temps : {fmtTime(totalPres)}</div><p style={{fontSize:12,color:'#92400e',marginTop:3}}>Le jury va maintenant poser ses questions.</p></div>)}
    {phase==='done'&&(<div style={{background:'#f0fdf4',border:'1.5px solid #86efac',borderRadius:12,padding:'12px 16px',marginBottom:12}}><div style={{fontWeight:700,color:'#166534'}}>🎉 Oral terminé ! Excellent travail.</div></div>)}
    <div style={{display:'flex',gap:8,justifyContent:'center',flexWrap:'wrap'}}>
      {phase==='idle'&&<button onClick={()=>{setPhase('presentation');setElapsed(0);}} style={{background:'#22c55e',color:'#fff',padding:'10px 22px',borderRadius:10,fontSize:14,fontWeight:600,border:'none',cursor:'pointer'}}>▶ Démarrer</button>}
      {phase==='pause'&&<button onClick={()=>{setPhase('questions');setElapsed(0);}} style={{background:'#3b82f6',color:'#fff',padding:'10px 22px',borderRadius:10,fontSize:14,fontWeight:600,border:'none',cursor:'pointer'}}>▶ Questions du jury</button>}
      {phase!=='idle'&&<button onClick={()=>{clearInterval(interval.current);setPhase('idle');setElapsed(0);}} style={{background:'var(--bg3)',color:'var(--text3)',padding:'10px 16px',borderRadius:10,fontSize:13,border:'1.5px solid var(--border)',cursor:'pointer'}}>↺ Reset</button>}
    </div>
    {urgent&&<div style={{marginTop:12,fontSize:13,fontWeight:700,color:'#ef4444',animation:'bounce 1s ease infinite'}}>⚠️ Moins d'une minute !</div>}
  </div>);
}

          <div style={{padding:'13px 20px',background:'var(--navy)'}}><div className="font-display" style={{fontWeight:700,fontSize:16,color:'#fff'}}>Simulateur Annexe 19</div></div>
          <table style={{width:'100%',fontSize:12,borderCollapse:'collapse'}}>
            <thead><tr style={{background:'var(--bg3)',borderBottom:'1.5px solid var(--border)'}}><th style={{textAlign:'left',padding:'8px 16px',fontWeight:600,color:'var(--text)'}}>Critère</th><th style={{textAlign:'center',padding:'8px',fontWeight:600,color:'var(--text)',width:60}}>Coef.</th><th style={{textAlign:'center',padding:'8px',fontWeight:600,color:'var(--text)',width:75}}>Note /20</th><th style={{textAlign:'right',padding:'8px 14px',fontWeight:600,color:'var(--text)',width:70}}>Points</th></tr></thead>
            <tbody>{GRILLE.map((g,i)=>{const note=pn(scores[i]);const pts=note*g.coef;return(<tr key={i} style={{borderBottom:'1px solid var(--border)',background:i%2?'var(--bg3)':'var(--bg2)'}}><td style={{padding:'9px 16px'}}><div style={{fontWeight:600,color:'var(--text)',fontSize:12}}>{g.c}</div><div style={{fontSize:10.5,color:'var(--text3)',marginTop:1}}>{g.d}</div></td><td style={{textAlign:'center',padding:'9px 8px'}}><span style={{background:'rgba(233,164,32,.15)',color:'#92400e',padding:'2px 9px',borderRadius:20,fontWeight:700,fontSize:11}}>×{g.coef}</span></td><td style={{textAlign:'center',padding:'7px'}}><input type="number" min="0" max="20" step="0.5" value={scores[i]||''} onChange={e=>setData(p=>({...p,grille:{...p.grille,[i]:Math.min(20,Math.max(0,parseFloat(e.target.value)||0))}}))} style={{width:55,textAlign:'center',fontSize:13,fontWeight:700,border:'1.5px solid var(--border)',borderRadius:8,padding:'4px',color:'#e9a420',background:'var(--bg2)',outline:'none'}}/></td><td style={{textAlign:'right',padding:'9px 14px',fontWeight:700,color:note>=12?'#16a34a':note>=8?'#d97706':'var(--text4)',fontSize:13}}>{note>0?pts.toFixed(1):'-'}</td></tr>);})}</tbody>
          </table>
          <div style={{padding:'14px 20px',background:'var(--bg3)',borderTop:'2px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:10}}>
            <div><div style={{fontSize:11,color:'var(--text3)'}}>Note simulée</div><div className="font-display" style={{fontSize:34,fontWeight:700,color:parseFloat(nf)>=12?'#16a34a':parseFloat(nf)>=8?'#d97706':'#dc2626'}}>{nf}/20</div></div>
            <div style={{textAlign:'right'}}><div style={{fontSize:12,color:'var(--text3)'}}>Mention estimée</div><div style={{fontSize:16,fontWeight:700,color:'var(--text)'}}>{parseFloat(nf)>=16?'🏆 Très Bien':parseFloat(nf)>=14?'✅ Bien':parseFloat(nf)>=12?'✔️ Assez Bien':parseFloat(nf)>=10?'📘 Passable':'⚠️ Insuffisant'}</div></div>
            <div style={{width:'100%',height:7,background:'var(--border2)',borderRadius:4}}><div style={{height:'100%',width:`${parseFloat(nf)/20*100}%`,background:parseFloat(nf)>=12?'#22c55e':parseFloat(nf)>=8?'#f59e0b':'#ef4444',borderRadius:4,transition:'width .5s'}}/></div>
          </div>
        </div>
      </div>);
    })()}
  </div>);
}

/* ══════════════════════════════════════════════
   SIDEBAR
══════════════════════════════════════════════ */
function Sidebar({active,onNav,prog,dark,toggleDark}){
  const steps=[
    {id:'dashboard',n:1,l:'Avancement',s:'Tableau de bord',col:'#7c3aed',icon:'📊'},
    {id:'entreprise',n:2,l:'Mon Entreprise',s:'Identité · Photos · Pitch',col:'#e9a420',icon:'🏢'},
    {id:'diagnostic',n:3,l:'Diagnostic',s:'PESTEL · Porter · SWOT',col:'#2563eb',icon:'🔍'},
    {id:'bmc',n:4,l:'Business Model',s:'Canvas 9 blocs',col:'#0891b2',icon:'🏗️'},
    {id:'finance',n:5,l:'Business Plan',s:'Finance · Moyens · RH',col:'#059669',icon:'💰'},
    {id:'outils',n:6,l:'Outils',s:'Prix · Retro · Aides',col:'#d97706',icon:'🧮'},
    {id:'examen',n:7,l:'Examen',s:'Timer · Questions · Note',col:'#ef4444',icon:'🎓'},
  ];
  return(<aside style={{width:230,flexShrink:0,background:'#0a1524',height:'100vh',position:'sticky',top:0,display:'flex',flexDirection:'column',overflow:'hidden'}}>
    <div style={{padding:'14px 16px',borderBottom:'1px solid rgba(255,255,255,.08)'}}>
      <div style={{display:'flex',alignItems:'center',gap:9}}>
        <div style={{width:34,height:34,borderRadius:9,background:'#e9a420',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'Playfair Display,serif',fontWeight:700,color:'#0a1524',fontSize:16}}>B</div>
        <div><div style={{fontFamily:'Playfair Display,serif',fontWeight:700,color:'#fff',fontSize:14,lineHeight:1.2}}>BTS MCO</div><div style={{fontSize:9.5,color:'#60a5fa',fontWeight:500}}>Entrepreneuriat Pro</div></div>
      </div>
    </div>
    <div style={{padding:'10px 14px',borderBottom:'1px solid rgba(255,255,255,.08)'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',fontSize:10,marginBottom:4}}><span style={{color:'#93c5fd'}}>Progression</span><span style={{color:'#fff',fontWeight:700,fontFamily:'Playfair Display,serif'}}>{prog}%</span></div>
      <div style={{height:4,background:'rgba(255,255,255,.1)',borderRadius:2}}><div style={{height:4,borderRadius:2,background:prog===100?'#22c55e':'#e9a420',width:`${prog}%`,transition:'width .6s ease'}}/></div>
    </div>
    <nav style={{flex:1,padding:'6px 8px',overflowY:'auto',display:'flex',flexDirection:'column',gap:2}}>
      {steps.map(step=>(<button key={step.id} onClick={()=>onNav(step.id)} className={`nav-item ${active===step.id?'active':''}`} style={{background:active===step.id?'rgba(255,255,255,.1)':'transparent'}}>
        <div style={{width:26,height:26,borderRadius:7,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,background:active===step.id?step.col:'rgba(255,255,255,.08)',transition:'background .15s'}}>{step.icon}</div>
        <div style={{flex:1,minWidth:0}}><div style={{fontSize:11.5,fontWeight:600,color:active===step.id?'#fff':'#93c5fd',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{step.l}</div><div style={{fontSize:9.5,color:'#4b6a8a',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{step.s}</div></div>
        {active===step.id&&<div style={{width:5,height:5,borderRadius:'50%',background:'#e9a420',flexShrink:0}}/>}
      </button>))}
    </nav>
    <div style={{padding:'8px 14px',borderTop:'1px solid rgba(255,255,255,.08)'}}>
      <button onClick={toggleDark} style={{width:'100%',padding:'7px 10px',borderRadius:9,background:'rgba(255,255,255,.07)',border:'1px solid rgba(255,255,255,.1)',color:'#93c5fd',cursor:'pointer',fontSize:11,fontWeight:500,display:'flex',alignItems:'center',justifyContent:'center',gap:5,marginBottom:5}}>
        {dark?'☀️ Mode clair':'🌙 Mode sombre'}
      </button>
      <p style={{fontSize:9.5,color:'#354d63',textAlign:'center'}}>💾 Sauvegarde automatique</p>
    </div>
  </aside>);
}

/* ══════════════════════════════════════════════
   APP
══════════════════════════════════════════════ */
function App(){
  const[sec,setSec]=useState('dashboard');
  const[cl,setCl]=useLS('bts_cl',{});
  const[diag,setDiag]=useLS('bts_diag',{pestel:{},porter:{},swot:{},ciblage:{}});
  const[bmc,setBmc]=useLS('bts_bmc',{});
  const[fin,setFin]=useLS('bts_fin',{});
  const[ent,setEnt]=useLS('bts_ent',{});
  const[outils,setOutils]=useLS('bts_outils',{});
  const[exam,setExam]=useLS('bts_exam',{});
  const[dark,setDark]=useLS('bts_dark',false);
  const[confetti,setConfetti]=useState(false);
  const{toasts,add,rm}=useToasts();
  const prevProg=useRef(0);
  const allItems=Object.values(CHECKLIST_DEF).flatMap(c=>c.items);
  const prog=Math.round(allItems.filter(i=>cl[i.id]==='OUI').length/allItems.length*100);
  useEffect(()=>{document.body.className=dark?'dark':'';},[dark]);
  useEffect(()=>{if(prog===100&&prevProg.current<100){setConfetti(true);setTimeout(()=>setConfetti(false),5000);}prevProg.current=prog;},[prog]);
  const labels={dashboard:'Mon Avancement',entreprise:'Mon Entreprise',diagnostic:'Diagnostic & Stratégie',bmc:'Business Model Canvas',finance:'Business Plan & Finance',outils:'Outils & Ressources',examen:'Préparation Examen'};
  return(<div style={{display:'flex',height:'100vh',overflow:'hidden',background:'var(--bg)'}}>
    <Confetti active={confetti}/>
    <Toast toasts={toasts} removeToast={rm}/>
    <Sidebar active={sec} onNav={setSec} prog={prog} dark={dark} toggleDark={()=>setDark(d=>!d)}/>
    <main style={{flex:1,overflowY:'auto'}}>
      <div style={{maxWidth:1080,margin:'0 auto',padding:'20px 24px 80px'}}>
        <div className="no-print" style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:22,flexWrap:'wrap',gap:10}}>
          <div style={{display:'flex',alignItems:'center',gap:6,fontSize:12,color:'var(--text3)'}}><span>BTS MCO</span><span>›</span><span style={{color:'var(--text)',fontWeight:600}}>{labels[sec]}</span></div>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <div style={{background:'rgba(233,164,32,.15)',color:'#92400e',padding:'4px 12px',borderRadius:20,fontSize:11,fontWeight:700}}>{prog}% complété</div>
            <button onClick={()=>window.print()} style={{fontSize:11,color:'var(--text3)',padding:'5px 12px',border:'1.5px solid var(--border)',borderRadius:8,background:'var(--bg2)',cursor:'pointer'}}>🖨️ Imprimer</button>
          </div>
        </div>
        {sec==='dashboard'&&<Dashboard cl={cl} setCl={setCl} toast={add}/>}
        {sec==='entreprise'&&<EntrepriseModule data={ent} setData={setEnt} toast={add}/>}
        {sec==='diagnostic'&&<DiagnosticModule data={diag} setData={setDiag}/>}
        {sec==='bmc'&&<BMCModule data={bmc} setData={setBmc}/>}
        {sec==='finance'&&<FinanceModule data={fin} setData={setFin}/>}
        {sec==='outils'&&<OutilsModule data={outils} setData={setOutils} finData={fin}/>}
        {sec==='examen'&&<ExamenModule data={exam} setData={setExam}/>}
      </div>
    </main>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
