function useLS(k,i){const[v,s]=useState(()=>{try{const x=localStorage.getItem(k);return x?JSON.parse(x):i;}catch{return i;}});useEffect(()=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}},[k,v]);return[v,s];}
function fmt(n){const v=parseFloat(String(n||'').replace(/\s/g,'').replace(',','.'))||0;return v.toLocaleString('fr-FR',{maximumFractionDigits:0});}
function pn(n){return parseFloat(String(n||'').replace(/\s/g,'').replace(',','.'))||0;}
function fmtTime(s){const m=Math.floor(s/60),sc=s%60;return`${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}`;}
function useToasts(){const[t,s]=useState([]);const add=useCallback((msg,type='info',dur=3000)=>{const id=Date.now();s(p=>[...p,{id,msg,type}]);setTimeout(()=>s(p=>p.filter(x=>x.id!==id)),dur);},[]);const rm=useCallback(id=>s(p=>p.filter(x=>x.id!==id)),[]);return{toasts:t,add,rm};}

function Confetti({active}){if(!active)return null;const p=Array.from({length:70},(_,i)=>({id:i,color:['#e9a420','#22c55e','#3b82f6','#a78bfa','#f43f5e'][i%5],left:Math.random()*100,delay:Math.random()*2,dur:2.5+Math.random()*2,size:6+Math.random()*8}));return(<div style={{position:'fixed',top:0,left:0,width:'100%',height:'100%',pointerEvents:'none',zIndex:9999,overflow:'hidden'}}>{p.map(x=>(<div key={x.id} style={{position:'fixed',top:-10,left:`${x.left}%`,width:x.size,height:x.size,backgroundColor:x.color,borderRadius:'2px',animation:`confettiFall ${x.dur}s ${x.delay}s ease-in forwards`}}/>))}</div>);}
function Toast({toasts,rm}){return(<div style={{position:'fixed',bottom:24,right:24,display:'flex',flexDirection:'column',gap:8,zIndex:8888,pointerEvents:'none'}}>{toasts.map(t=>(<div key={t.id} onClick={()=>rm(t.id)} className="toast-enter" style={{background:t.type==='success'?'#166534':'#0f1c2d',color:'#fff',padding:'10px 16px',borderRadius:12,fontSize:13,fontWeight:500,minWidth:220,boxShadow:'0 4px 16px rgba(0,0,0,.25)',display:'flex',alignItems:'center',gap:8,pointerEvents:'auto',cursor:'pointer'}}><span>{t.type==='success'?'✅':'💬'}</span>{t.msg}</div>))}</div>);}
function ProgressRing({pct,size=80,sw=7,color='#e9a420'}){const r=(size-sw*2)/2,c=2*Math.PI*r,d=(pct/100)*c;return(<svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}><circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--border2)" strokeWidth={sw}/><circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={sw} strokeDasharray={`${d} ${c}`} strokeLinecap="round" transform={`rotate(-90 ${size/2} ${size/2})`} style={{transition:'stroke-dasharray .6s ease'}}/><text x={size/2} y={size/2} textAnchor="middle" dominantBaseline="middle" fontSize={size*.21} fontWeight="700" fill={color} fontFamily="Playfair Display,serif">{pct}%</text></svg>);}
function Pill({val,onChange}){const s={OUI:{on:{background:'#22c55e',color:'#fff',borderColor:'#22c55e'},off:{background:'#dcfce7',color:'#166534',borderColor:'#86efac'}},'EN COURS':{on:{background:'#f59e0b',color:'#fff',borderColor:'#f59e0b'},off:{background:'#fef9c3',color:'#854d0e',borderColor:'#fde047'}},NON:{on:{background:'#ef4444',color:'#fff',borderColor:'#ef4444'},off:{background:'#fee2e2',color:'#991b1b',borderColor:'#fca5a5'}}};return(<div style={{display:'flex',gap:3}}>{['OUI','EN COURS','NON'].map(o=>(<button key={o} onClick={()=>onChange(o)} className="pill" style={{...(val===o?s[o].on:s[o].off),fontSize:10,padding:'2px 7px'}}>{o}</button>))}</div>);}
function RadarChart({data}){const S=230,cx=S/2,cy=S/2,R=78,n=data.length;const pt=(i,r)=>({x:cx+r*Math.cos(2*Math.PI*i/n-Math.PI/2),y:cy+r*Math.sin(2*Math.PI*i/n-Math.PI/2)});const dpts=data.map((d,i)=>pt(i,R*(d.v/10)));const path=dpts.map((p,i)=>`${i?'L':'M'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ')+'Z';const avg=(data.reduce((s,d)=>s+d.v,0)/data.length).toFixed(1);return(<div style={{textAlign:'center'}}><svg viewBox={`0 0 ${S} ${S}`} style={{width:'100%',maxWidth:210}}>{[.25,.5,.75,1].map(l=>(<polygon key={l} points={Array.from({length:n},(_,i)=>{const p=pt(i,R*l);return`${p.x.toFixed(1)},${p.y.toFixed(1)}`;}).join(' ')} fill="none" stroke="var(--border)" strokeWidth="1"/>))}{Array.from({length:n},(_,i)=>{const p=pt(i,R);return<line key={i} x1={cx} y1={cy} x2={p.x} y2={p.y} stroke="var(--border)" strokeWidth="1"/>;})} <path d={path} fill="rgba(233,164,32,.18)" stroke="#e9a420" strokeWidth="2.5"/>{dpts.map((p,i)=><circle key={i} cx={p.x} cy={p.y} r="4" fill="#e9a420" stroke="var(--bg2)" strokeWidth="2"/>)}{data.map((d,i)=>{const p=pt(i,R+22);return<text key={i} x={p.x} y={p.y} textAnchor="middle" dominantBaseline="middle" fontSize="9.5" fill="var(--text2)" fontFamily="DM Sans,sans-serif" fontWeight="600">{d.abbr}</text>;})}</svg><div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>Intensité moy. <strong style={{color:avg>7?'#ef4444':avg>5?'#f59e0b':'#22c55e'}}>{avg}/10</strong></div></div>);}
function MiniBar({data,color='#e9a420',height=50}){const max=Math.max(...data.map(d=>Math.abs(d.v)),1);return(<div style={{display:'flex',alignItems:'flex-end',gap:4,height,width:'100%'}}>{data.map((d,i)=>(<div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:2}}><div style={{width:'100%',height:Math.abs(d.v)/max*height,background:d.v>=0?color:'#ef4444',borderRadius:'3px 3px 0 0',transition:'height .5s',minHeight:2}}/><div style={{fontSize:8,color:'var(--text4)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:'100%'}}>{d.l}</div></div>))}</div>);}
function CheckBox({checked,onChange}){return(<div onClick={onChange} style={{width:20,height:20,borderRadius:5,border:`2px solid ${checked?'#22c55e':'var(--border)'}`,background:checked?'#22c55e':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,cursor:'pointer',transition:'all .2s'}}>{checked&&<span style={{color:'#fff',fontSize:11,fontWeight:700}}>✓</span>}</div>);}
function NI({val,onChange}){return(<input type="number" placeholder="0" value={val||''} onChange={e=>onChange(e.target.value)} className="fin-input"/>);}

        <textarea value={data[q.k]||''} onChange={e=>up(q.k,e.target.value)} placeholder={q.ph} rows={3} style={{width:'100%',fontSize:12,color:'var(--text2)',border:'1.5px solid var(--border)',borderRadius:8,padding:'9px 12px',resize:'none',background:'var(--bg2)'}}/>
      </div>))}
    </div>)}

    {tab==='ca'&&(<div style={{display:'flex',flexDirection:'column',gap:14}}>
      <div style={{background:'#eff6ff',border:'1.5px solid #bfdbfe',borderRadius:12,padding:'12px 16px',fontSize:13,color:'#1e40af'}}>
        <strong>Méthode BPI France :</strong> Utilisez <strong>2 méthodes différentes</strong> pour croiser vos estimations. Un CA prévisionnel doit être réaliste — ni trop pessimiste, ni trop optimiste.
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
        <div className="card" style={{padding:20}}>
          <div className="font-display" style={{fontWeight:700,fontSize:15,color:'var(--text)',marginBottom:3}}>🔢 Méthode 1 — Approche client</div>

          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            {[{k:'nb_clients',l:'Nombre de clients potentiels',ph:'Ex: 200'},{k:'panier_moyen',l:'Panier moyen (€)',ph:'Ex: 45'},{k:'freq_achat',l:"Fréquence d'achat annuelle",ph:'Ex: 12 (mensuel)'}].map(f=>(<div key={f.k}><label style={{fontSize:11,fontWeight:600,color:'var(--text3)',display:'block',marginBottom:3}}>{f.l}</label><input type="number" value={data[f.k]||''} onChange={e=>up(f.k,e.target.value)} placeholder={f.ph} style={{width:'100%',padding:'8px 12px',border:'1.5px solid var(--border)',borderRadius:8,fontSize:13,color:'var(--text)',background:'var(--bg2)'}}/></div>))}
            <div style={{borderTop:'2px solid var(--navy)',paddingTop:10,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{fontWeight:700,color:'var(--text)',fontSize:12}}>CA estimé Méthode 1</span>
              <span className="font-display" style={{fontSize:20,fontWeight:700,color:'#7c3aed'}}>{fmt(ca_methode1)} €</span>
            </div>
          </div>
        </div>

        <div className="card" style={{padding:20}}>
          <div className="font-display" style={{fontWeight:700,fontSize:15,color:'var(--text)',marginBottom:3}}>📊 Méthode 2 — Part de marché</div>
          <p style={{fontSize:11,color:'var(--text3)',marginBottom:14}}>Taille du marché × Part de marché visée</p>
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            {[{k:'marche_taille',l:'Taille du marché local (€/an)',ph:'Ex: 500000'},{k:'part_marche',l:'Part de marché visée (%)',ph:'Ex: 2'}].map(f=>(<div key={f.k}><label style={{fontSize:11,fontWeight:600,color:'var(--text3)',display:'block',marginBottom:3}}>{f.l}</label><input type="number" value={data[f.k]||''} onChange={e=>up(f.k,e.target.value)} placeholder={f.ph} style={{width:'100%',padding:'8px 12px',border:'1.5px solid var(--border)',borderRadius:8,fontSize:13,color:'var(--text)',background:'var(--bg2)'}}/></div>))}
            <div style={{background:'var(--bg3)',borderRadius:8,padding:'10px 12px',fontSize:12,color:'var(--text3)',border:'1px solid var(--border)'}}>
              <strong style={{color:'var(--text)'}}>Source du marché :</strong>
              <input type="text" value={data.source_marche||''} onChange={e=>up('source_marche',e.target.value)} placeholder="Ex: INSEE 2023, Étude sectorielle CCI..." style={{width:'100%',marginTop:4,padding:'6px 10px',border:'1.5px solid var(--border)',borderRadius:6,fontSize:12,color:'var(--text)',background:'var(--bg2)'}}/>
            </div>
            <div style={{borderTop:'2px solid var(--navy)',paddingTop:10,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{fontWeight:700,color:'var(--text)',fontSize:12}}>CA estimé Méthode 2</span>
              <span className="font-display" style={{fontSize:20,fontWeight:700,color:'#0891b2'}}>{fmt(ca_methode2)} €</span>
            </div>
          </div>
        </div>
      </div>

      <div className="card" style={{padding:20}}>
        <div className="font-display" style={{fontWeight:700,fontSize:15,color:'var(--text)',marginBottom:12}}>🎯 CA Prévisionnel Retenu</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:14}}>
          {[{k:'ca_bas',l:'Hypothèse basse',c:'#ef4444'},{k:'ca_moyen',l:'Hypothèse centrale',c:'#e9a420'},{k:'ca_haut',l:'Hypothèse haute',c:'#22c55e'}].map(h=>(<div key={h.k} style={{textAlign:'center'}}>
            <label style={{display:'block',fontSize:11,fontWeight:700,color:h.c,marginBottom:6,textTransform:'uppercase'}}>{h.l}</label>
            <input type="number" value={data[h.k]||''} onChange={e=>up(h.k,e.target.value)} placeholder="0" style={{width:'100%',padding:'8px',border:`2px solid ${h.c}33`,borderRadius:10,fontSize:15,fontWeight:700,textAlign:'center',color:h.c,background:'var(--bg2)'}}/>
            <div style={{fontSize:9,color:'var(--text4)',marginTop:2}}>€/an</div>
          </div>))}
        </div>
        <div>
          <label style={{fontSize:12,fontWeight:700,color:'var(--text)',display:'block',marginBottom:5}}>📝 Justification et hypothèses retenues</label>
          <textarea value={data.ca_justification||''} onChange={e=>up('ca_justification',e.target.value)} placeholder="Expliquez comment vous avez construit ces chiffres, quelles hypothèses, quelles sources..." rows={4} style={{width:'100%',fontSize:12,color:'var(--text2)',border:'1.5px solid var(--border)',borderRadius:8,padding:'9px 12px',resize:'none',background:'var(--bg2)'}}/>
        </div>
        {(ca_methode1>0||ca_methode2>0)&&(<div style={{marginTop:10,padding:'10px 14px',background:'var(--bg3)',borderRadius:8,border:'1px solid var(--border)',fontSize:12,color:'var(--text3)'}}>
          Vos 2 méthodes donnent : <strong style={{color:'#7c3aed'}}>{fmt(ca_methode1)} €</strong> et <strong style={{color:'#0891b2'}}>{fmt(ca_methode2)} €</strong>. L'hypothèse centrale devrait se situer entre ces deux valeurs.
        </div>)}
      </div>
    </div>)}

    {tab==='concurrence'&&(<div style={{display:'flex',flexDirection:'column',gap:14}}>
      <div style={{background:'#fef9c3',border:'1.5px solid #fde047',borderRadius:12,padding:'10px 16px',fontSize:13,color:'#854d0e',marginBottom:4}}>
        <strong>Rappel BPI France :</strong> "Une absence de concurrence ne signifie pas un marché à prendre — certains y ont peut-être déjà essuyé un échec."
      </div>
      {[1,2,3].map(i=>(<div key={i} className="card" style={{padding:18,borderLeft:'4px solid #0891b2'}}>
        <div className="font-display" style={{fontWeight:700,fontSize:14,color:'var(--text)',marginBottom:10}}>🏢 Concurrent {i}</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(180px,1fr))',gap:10}}>
          {[{k:`conc${i}_nom`,l:'Nom',ph:'Nom du concurrent'},{k:`conc${i}_offre`,l:'Offre proposée',ph:'Produits/services...'},{k:`conc${i}_prix`,l:'Prix pratiqués',ph:'Ex: 20-50 €'},{k:`conc${i}_atouts`,l:'Ses atouts',ph:'Notoriété, prix, qualité...'},{k:`conc${i}_faiblesses`,l:'Ses faiblesses',ph:'Ce qu\'il fait mal...'}].map(f=>(<div key={f.k}><label style={{fontSize:11,fontWeight:600,color:'var(--text3)',display:'block',marginBottom:3}}>{f.l}</label><input type="text" value={data[f.k]||''} onChange={e=>up(f.k,e.target.value)} placeholder={f.ph} style={{width:'100%',padding:'7px 10px',border:'1.5px solid var(--border)',borderRadius:7,fontSize:12,color:'var(--text)',background:'var(--bg2)'}}/></div>))}
        </div>
      </div>))}
      <div className="card" style={{padding:16}}>
        <label style={{fontSize:13,fontWeight:700,color:'var(--text)',display:'block',marginBottom:6}}>🏆 Avantage concurrentiel — Ce qui vous distingue</label>
        <textarea value={data.avantage_concurrentiel||''} onChange={e=>up('avantage_concurrentiel',e.target.value)} placeholder="Expliquez en quoi votre offre est supérieure ou différente de chaque concurrent identifié..." rows={3} style={{width:'100%',fontSize:12,color:'var(--text2)',border:'1.5px solid var(--border)',borderRadius:8,padding:'9px 12px',resize:'none',background:'var(--bg2)'}}/>
      </div>
    </div>)}
    {tab==='enquete'&&<EnqueteModule data={data} setData={setData}/>}
  </div>);
}

   COMPOSANTS PARTAGÉS : CARTE, RISQUES, ENQUÊTE, IA, SIMUL

const RISQUES_DEF=[
  {categorie:'🌍 Environnement général',ph_desc:"Évolution défavorable de la législation, crise économique...",ph_trait:"Veille réglementaire active, diversification, plan de contingence...",niveau:'🟡 Modéré'},
  {categorie:'📊 Marché & Concurrence',ph_desc:"Mauvaise estimation du marché, manque d'adhésion, concurrent majeur...",ph_trait:"Actions de communication, ajustement de l'offre...",niveau:'🟡 Modéré'},
  {categorie:'⚙️ Outils opérationnels',ph_desc:"Panne matériel, rupture d'approvisionnement, problème informatique...",ph_trait:"Contrat de maintenance, fournisseurs alternatifs, stock de sécurité...",niveau:'🟢 Faible'},
  {categorie:'👤 Ressources humaines',ph_desc:"Maladie du dirigeant, départ d'un employé clé, difficulté de recrutement...",ph_trait:"Polyvalence, protocoles documentés, assurance prévoyance...",niveau:'🟡 Modéré'},
  {categorie:'🤝 Tiers & Partenaires',ph_desc:"Augmentation des prix fournisseurs, cessation relation, client défaillant...",ph_trait:"Plusieurs fournisseurs qualifiés, contrats long terme, assurance crédit...",niveau:'🟡 Modéré'},
];

function CartePerceptuelle({data,setData}){
  const upC=(k,v)=>setData(p=>({...p,carte:{...p.carte,[k]:v}}));
  const c=data.carte||{};
  const axeH=c.axeH||'Traditionnel ← → Innovant';
  const axeV=c.axeV||'Peu respectueux ↓ ↑ Très respectueux';
  const concs=c.concurrents||[{nom:'Concurrent A',x:30,y:40},{nom:'Concurrent B',x:65,y:35}];
  const monX=parseFloat(c.monX)||75;const monY=parseFloat(c.monY)||75;
  const nom=c.nomEntreprise||'Mon entreprise';
  const upConc=(i,f,v)=>{const arr=[...concs];arr[i]={...arr[i],[f]:v};upC('concurrents',arr);};
  return(<div style={{display:'flex',flexDirection:'column',gap:14}}>
    <div style={{background:'#eff6ff',border:'1.5px solid #bfdbfe',borderRadius:12,padding:'10px 15px',fontSize:13,color:'#1e40af'}}><strong>Carte perceptuelle :</strong> Positionnez visuellement votre entreprise face aux concurrents sur 2 axes. Très apprécié à l'oral.</div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
      <div className="card" style={{padding:18}}>
        <div className="font-display" style={{fontWeight:700,fontSize:15,color:'var(--text)',marginBottom:12}}>⚙️ Configuration</div>
        <div style={{display:'flex',flexDirection:'column',gap:9}}>
          {[{k:'axeH',l:'Axe horizontal',v:axeH,ph:'Ex: Traditionnel → Innovant'},{k:'axeV',l:'Axe vertical',v:axeV,ph:'Ex: Prix bas ↑ Prix élevé'},{k:'nomEntreprise',l:'Votre entreprise',v:nom,ph:'Mon entreprise'}].map(f=>(<div key={f.k}><label style={{fontSize:10,fontWeight:700,color:'var(--text3)',display:'block',marginBottom:2}}>{f.l}</label><input type="text" value={f.v} onChange={e=>upC(f.k,e.target.value)} placeholder={f.ph} style={{width:'100%',padding:'7px 10px',border:'1.5px solid var(--border)',borderRadius:7,fontSize:12,color:'var(--text)',background:'var(--bg2)'}}/></div>))}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:7}}>{[{k:'monX',l:`X = ${monX}`,v:monX},{k:'monY',l:`Y = ${monY}`,v:monY}].map(f=>(<div key={f.k}><label style={{fontSize:10,fontWeight:700,color:'#e9a420',display:'block',marginBottom:2}}>{f.l}</label><input type="range" min="5" max="95" value={f.v} onChange={e=>upC(f.k,e.target.value)} style={{width:'100%',accentColor:'#e9a420'}}/></div>))}</div>
          <div>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:5}}><span style={{fontSize:11,fontWeight:700,color:'var(--text)'}}>Concurrents</span><button onClick={()=>upC('concurrents',[...concs,{nom:`Conc. ${concs.length+1}`,x:50,y:50}])} style={{fontSize:10,padding:'2px 8px',background:'var(--navy)',color:'#fff',border:'none',borderRadius:6,cursor:'pointer'}}>+ Ajouter</button></div>
            {concs.map((co,i)=>(<div key={i} style={{display:'grid',gridTemplateColumns:'1fr 42px 42px 22px',gap:4,marginBottom:4,alignItems:'center'}}>
              <input type="text" value={co.nom} onChange={e=>upConc(i,'nom',e.target.value)} style={{padding:'4px 8px',border:'1.5px solid var(--border)',borderRadius:6,fontSize:10,color:'var(--text)',background:'var(--bg2)'}}/>
              <input type="number" min="0" max="100" value={co.x} onChange={e=>upConc(i,'x',parseInt(e.target.value)||0)} title="X" style={{padding:'4px',border:'1.5px solid var(--border)',borderRadius:6,fontSize:10,textAlign:'center',color:'var(--text)',background:'var(--bg2)'}}/>
              <input type="number" min="0" max="100" value={co.y} onChange={e=>upConc(i,'y',parseInt(e.target.value)||0)} title="Y" style={{padding:'4px',border:'1.5px solid var(--border)',borderRadius:6,fontSize:10,textAlign:'center',color:'var(--text)',background:'var(--bg2)'}}/>
              <button onClick={()=>upC('concurrents',concs.filter((_,j)=>j!==i))} style={{background:'#fee2e2',color:'#dc2626',border:'none',borderRadius:5,width:22,height:22,cursor:'pointer',fontSize:13,display:'flex',alignItems:'center',justifyContent:'center'}}>×</button>
            </div>))}
          </div>
        </div>
      </div>
      <div className="card" style={{padding:14}}>
        <div className="font-display" style={{fontWeight:700,fontSize:14,color:'var(--text)',marginBottom:8,textAlign:'center'}}>🗺️ Carte perceptuelle</div>
        <svg viewBox="0 0 300 300" style={{width:'100%',background:'var(--bg3)',borderRadius:10,border:'1.5px solid var(--border)'}}>
          {[1,2,3].map(i=>[<line key={`h${i}`} x1="15" y1={15+i*67.5} x2="285" y2={15+i*67.5} stroke="var(--border)" strokeWidth="0.5" strokeDasharray="2,3"/>,<line key={`v${i}`} x1={15+i*67.5} y1="15" x2={15+i*67.5} y2="285" stroke="var(--border)" strokeWidth="0.5" strokeDasharray="2,3"/>])}
          <rect x="15" y="15" width="270" height="270" fill="none" stroke="var(--border2)" strokeWidth="1"/>
          <line x1="15" y1="150" x2="285" y2="150" stroke="var(--text3)" strokeWidth="1.5"/><line x1="150" y1="15" x2="150" y2="285" stroke="var(--text3)" strokeWidth="1.5"/>
          <polygon points="283,147 290,150 283,153" fill="var(--text3)"/><polygon points="147,17 150,10 153,17" fill="var(--text3)"/>
          <text x="150" y="296" textAnchor="middle" fontSize="7" fill="var(--text3)" fontFamily="DM Sans,sans-serif">{axeH.slice(0,38)}</text>
          <text x="8" y="150" textAnchor="middle" fontSize="7" fill="var(--text3)" fontFamily="DM Sans,sans-serif" transform="rotate(-90,8,150)">{axeV.slice(0,28)}</text>
          {concs.map((co,i)=>{const cx2=15+(co.x/100)*270;const cy2=285-(co.y/100)*270;const cols=['#ef4444','#3b82f6','#8b5cf6','#06b6d4','#f97316'];return(<g key={i}><circle cx={cx2} cy={cy2} r="7.5" fill={cols[i%5]} opacity="0.82"/><text x={cx2} y={cy2-11} textAnchor="middle" fontSize="8" fill="var(--text)" fontFamily="DM Sans,sans-serif" fontWeight="600">{co.nom.slice(0,13)}</text></g>);})}
          {(()=>{const cx2=15+(monX/100)*270;const cy2=285-(monY/100)*270;return(<g><circle cx={cx2} cy={cy2} r="10" fill="#e9a420" stroke="#fff" strokeWidth="2"/><text x={cx2} y={cy2-14} textAnchor="middle" fontSize="9" fill="#e9a420" fontFamily="DM Sans,sans-serif" fontWeight="700">{nom.slice(0,15)}</text></g>);}  )()}
          <circle cx="22" cy="292" r="4.5" fill="#e9a420"/><text x="30" y="295" fontSize="7" fill="var(--text)" fontFamily="DM Sans,sans-serif" fontWeight="600">Votre entreprise</text>
        </svg>
        <p style={{fontSize:9.5,color:'var(--text4)',marginTop:4,textAlign:'center'}}>Ajustez X/Y (0=gauche/bas → 100=droite/haut)</p>
      </div>
    </div>
    <div className="card" style={{padding:14}}><label style={{fontSize:12,fontWeight:700,color:'var(--text)',display:'block',marginBottom:4}}>📝 Analyse du positionnement</label><textarea value={c.analyse||''} onChange={e=>upC('analyse',e.target.value)} placeholder="Pourquoi ces 2 axes ? Quelle est votre zone de différenciation unique ? Que révèle cette carte ?" rows={3} style={{width:'100%',fontSize:12,color:'var(--text2)',border:'1.5px solid var(--border)',borderRadius:8,padding:'8px 11px',resize:'none',background:'var(--bg2)'}}/></div>
  </div>);
}

function AnalyseRisques({data,setData}){
  const risques=data.risques||RISQUES_DEF;
  const upR=(i,f,v)=>setData(p=>{const r=[...(p.risques||RISQUES_DEF)];r[i]={...r[i],[f]:v};return{...p,risques:r};});
  const NIVEAUX=['🟢 Faible','🟡 Modéré','🔴 Élevé'];
  const nCol={'🟢 Faible':'#16a34a','🟡 Modéré':'#d97706','🔴 Élevé':'#dc2626'};
  return(<div style={{display:'flex',flexDirection:'column',gap:13}}>
    <div style={{background:'#fef9c3',border:'1.5px solid #fde047',borderRadius:12,padding:'10px 15px',fontSize:13,color:'#854d0e'}}><strong>Source : INSECTEOO / BPI France.</strong> Anticiper les risques inspire confiance au jury et aux partenaires financiers.</div>
    <div style={{display:'flex',gap:9,flexWrap:'wrap'}}>{NIVEAUX.map(n=>{const count=risques.filter(r=>(r.niveau||'🟡 Modéré')===n).length;return(<div key={n} style={{padding:'5px 13px',borderRadius:20,background:`${nCol[n]}14`,border:`1.5px solid ${nCol[n]}40`,fontSize:11,fontWeight:700,color:nCol[n]}}>{n} : {count}</div>);})}</div>
    <div className="card" style={{overflow:'hidden'}}>
      <div style={{padding:'10px 15px',background:'var(--navy)'}}><div className="font-display" style={{fontWeight:700,fontSize:14,color:'#fff'}}>Tableau d'Analyse des Risques</div></div>
      <div style={{overflowX:'auto'}}><table style={{width:'100%',fontSize:11.5,borderCollapse:'collapse',minWidth:600}}>
        <thead><tr style={{background:'var(--bg3)',borderBottom:'1.5px solid var(--border)'}}><th style={{textAlign:'left',padding:'7px 13px',fontWeight:600,color:'var(--text)',width:165}}>Nature du risque</th><th style={{textAlign:'left',padding:'7px 9px',fontWeight:600,color:'var(--text)'}}>Description</th><th style={{textAlign:'center',padding:'7px',fontWeight:600,color:'var(--text)',width:110}}>Niveau</th><th style={{textAlign:'left',padding:'7px 9px',fontWeight:600,color:'var(--text)'}}>Stratégie de traitement</th></tr></thead>
        <tbody>{risques.map((r,i)=>(<tr key={i} style={{borderBottom:'1px solid var(--border)',background:i%2?'var(--bg3)':'var(--bg2)'}}>
          <td style={{padding:'7px 13px',fontWeight:700,color:'var(--text)',fontSize:10.5,verticalAlign:'top'}}>{r.categorie}</td>
          <td style={{padding:'4px 6px',verticalAlign:'top'}}><textarea value={r.description||''} onChange={e=>upR(i,'description',e.target.value)} placeholder={r.ph_desc} rows={3} style={{width:'100%',fontSize:10.5,color:'var(--text2)',border:'1px solid var(--border)',borderRadius:6,padding:'5px 7px',resize:'none',background:'var(--bg2)'}}/></td>
          <td style={{padding:'4px 6px',textAlign:'center',verticalAlign:'top'}}><select value={r.niveau||'🟡 Modéré'} onChange={e=>upR(i,'niveau',e.target.value)} style={{fontSize:10.5,padding:'4px 6px',border:`1.5px solid ${nCol[r.niveau||'🟡 Modéré']}`,borderRadius:7,background:`${nCol[r.niveau||'🟡 Modéré']}12`,color:nCol[r.niveau||'🟡 Modéré'],cursor:'pointer',fontWeight:700}}>{NIVEAUX.map(n=>(<option key={n}>{n}</option>))}</select></td>
          <td style={{padding:'4px 6px',verticalAlign:'top'}}><textarea value={r.traitement||''} onChange={e=>upR(i,'traitement',e.target.value)} placeholder={r.ph_trait} rows={3} style={{width:'100%',fontSize:10.5,color:'var(--text2)',border:'1px solid var(--border)',borderRadius:6,padding:'5px 7px',resize:'none',background:'var(--bg2)'}}/></td>
        </tr>))}</tbody>
      </table></div>
    </div>
  </div>);
}

function EnqueteModule({data,setData}){
  const up=(k,v)=>setData(p=>({...p,enq:{...p.enq,[k]:v}}));
  const enq=data.enq||{};
  const Bar=({pct})=>{const p=Math.min(100,Math.max(0,parseFloat(pct)||0));return(<div style={{height:5,background:'var(--border2)',borderRadius:3,marginTop:3,flex:1}}><div style={{height:'100%',width:`${p}%`,background:p>=60?'#22c55e':p>=40?'#e9a420':'#ef4444',borderRadius:3,transition:'width .4s'}}/></div>);};
  const QS=[
    {k:'q1',l:"Connaissent votre concept",ex:"93% (INSECTEOO)"},
    {k:'q2',l:"Seraient prêts à essayer",ex:"58% (INSECTEOO)"},
    {k:'q4',l:"Achèteraient sur place/au stand",ex:"75% (INSECTEOO)"},
    {k:'q5',l:"Viendraient au triporteur/stand",ex:"62% (INSECTEOO)"},
  ];
  return(<div style={{display:'flex',flexDirection:'column',gap:13}}>

function AIAssistant({context,sectionName}){

    setLoading(true);setAdvice('');
    try{
      const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:600,
          system:`Tu es un expert en entrepreneuriat et BTS MCO. Tu aides les étudiants à améliorer leur dossier pour l'épreuve E6. Donne des conseils précis, concrets, bienveillants, en français, en 3-5 points max. Sois encourageant.`,
          messages:[{role:'user',content:`Section : ${sectionName}\nContenu étudiant :\n${JSON.stringify(context,null,2).slice(0,1400)}\nQuestion : ${prompt}`}]})});
      const d=await res.json();setAdvice(d.content?.[0]?.text||'Pas de réponse');
    }catch{setAdvice('Erreur de connexion.');}

  return(<div className="card" style={{padding:16,border:'2px solid #a78bfa',background:'rgba(124,58,237,.04)'}}>

      <div style={{display:'flex',alignItems:'center',gap:8}}><div style={{width:30,height:30,borderRadius:9,background:'linear-gradient(135deg,#7c3aed,#a78bfa)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:15}}>🤖</div><div><div className="font-display" style={{fontWeight:700,fontSize:13,color:'var(--text)'}}>Assistant IA — {sectionName}</div><p style={{fontSize:10,color:'var(--text3)'}}>Conseils personnalisés sur votre travail</p></div></div>
      <button onClick={()=>{setOpen(false);setAdvice('');}} style={{background:'transparent',border:'none',color:'var(--text3)',cursor:'pointer',fontSize:15}}>✕</button>

    <div style={{display:'flex',gap:7,marginBottom:10}}>

function SimulateurOral(){
  const[current,setCurrent]=useState(null);const[elapsed,setElapsed]=useState(0);const[running,setRunning]=useState(false);const[shown,setShown]=useState(false);const ivl=useRef(null);const MAX=120;
  const draw=()=>{const q=QUESTION_BANK[Math.floor(Math.random()*QUESTION_BANK.length)];setCurrent(q);setElapsed(0);setRunning(true);setShown(false);clearInterval(ivl.current);ivl.current=setInterval(()=>setElapsed(e=>{if(e+1>=MAX){clearInterval(ivl.current);setRunning(false);return MAX;}return e+1;}),1000);};
  useEffect(()=>()=>clearInterval(ivl.current),[]);

  return(<div className="card" style={{padding:18,border:'1.5px solid #e9a420',background:'rgba(233,164,32,.03)'}}>

    {current&&(<div style={{marginBottom:12}}>
      <div style={{background:'var(--navy)',borderRadius:11,padding:'12px 16px',marginBottom:9}}><div style={{fontSize:9.5,color:'#e9a420',fontWeight:700,marginBottom:3,textTransform:'uppercase'}}>{current.cat}</div><div style={{fontSize:14,fontWeight:600,color:'#fff',lineHeight:1.5}}>{current.q}</div></div>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:7}}><ProgressRing pct={Math.round(pct)} size={55} sw={5} color={rc}/><div style={{flex:1}}><div style={{fontSize:22,fontWeight:700,color:rc,fontVariantNumeric:'tabular-nums'}}>{Math.floor(rem/60)}:{String(rem%60).padStart(2,'0')}</div>{!running&&elapsed>=MAX&&<div style={{fontSize:11,fontWeight:700,color:'#dc2626'}}>⏰ Temps écoulé !</div>}</div><button onClick={()=>setShown(s=>!s)} style={{padding:'6px 12px',background:'rgba(233,164,32,.15)',border:'1.5px solid #e9a420',borderRadius:8,cursor:'pointer',fontSize:11,fontWeight:600,color:'#92400e'}}>{shown?'Masquer':'💡 Conseil'}</button></div>
      {shown&&<div style={{background:'rgba(8,145,178,.08)',border:'1.5px solid rgba(8,145,178,.25)',borderRadius:8,padding:'9px 12px',fontSize:12,color:'#0891b2',lineHeight:1.6}}>{current.tip}</div>}
    </div>)}
    {!current&&<p style={{color:'var(--text3)',fontSize:12,marginBottom:10,textAlign:'center'}}>Tirez une question et répondez en 2 minutes.</p>}
    <div style={{display:'flex',gap:7}}><button onClick={draw} style={{background:'#e9a420',color:'#fff',padding:'8px 16px',borderRadius:9,fontSize:13,fontWeight:700,border:'none',cursor:'pointer'}}>🎲 Tirer une question</button>{running&&<button onClick={()=>{clearInterval(ivl.current);setRunning(false);}} style={{padding:'8px 12px',background:'var(--bg3)',border:'1.5px solid var(--border)',borderRadius:9,fontSize:12,color:'var(--text3)',cursor:'pointer'}}>⏸</button>}</div>
  </div>);
}

      </div>
      <div style={{padding:'10px 18px',textAlign:'center',fontSize:13,fontWeight:700,background:Math.abs(totBes-totRes)<1?'#f0fdf4':'#fef2f2',color:Math.abs(totBes-totRes)<1?'#166534':'#991b1b'}}>

function GestionModule({data,setData,finData}){
  const up=(k,v)=>setData(p=>({...p,[k]:v}));

    const m=`m${i+1}`;
    const ca=gR(m,'ca_reel');
    const charges=gR(m,'charges_reel');
    const prevMens=caPrev/12;
    return{m,ca,charges,prevMens,ecart:ca-prevMens};
  });

  const totalCAR=moisData.reduce((s,d)=>s+d.ca,0);
  const txReal=caPrev>0?(totalCAR/caPrev*100).toFixed(0):0;

  return(<div className="section-enter">

      {[
        {l:'CA Prévisionnel An.1',v:fmt(caPrev)+' €',c:'#7c3aed',i:'📊'},
        {l:'CA Réalisé (saisi)',v:fmt(totalCAR)+' €',c:totalCAR>=caPrev*0.8?'#16a34a':'#dc2626',i:'💰'},

        <div><div className="font-display" style={{fontWeight:700,fontSize:16,color:'#fff'}}>Checklist Oral — {oralDone}/{ORAL.length}</div>{oralDone===ORAL.length&&<p style={{fontSize:12,color:'#fde68a'}}>🎉 Prêt(e) !</p>}</div>
      </div>
      <div className="card" style={{overflow:'hidden'}}><div style={{padding:'8px 16px',background:'#92400e'}}><div className="font-display" style={{fontWeight:700,fontSize:13,color:'#fff'}}>Format : 10 min présentation + 10 min questions</div></div><div style={{padding:'9px 13px',display:'flex',flexDirection:'column',gap:4}}>{ORAL.map(item=>(<div key={item.id}>{item.sec&&<div style={{fontSize:9,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.07em',margin:'9px 0 4px',paddingTop:7,borderTop:'1px solid var(--border)'}}>{item.sec}</div>}<div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:9,padding:'6px 11px',borderRadius:8,background:data.oral?.[item.id]==='OUI'?'rgba(34,197,94,.06)':'var(--bg3)'}}><div style={{display:'flex',alignItems:'center',gap:6}}><div style={{width:6,height:6,borderRadius:'50%',flexShrink:0,background:data.oral?.[item.id]==='OUI'?'#22c55e':data.oral?.[item.id]==='EN COURS'?'#f59e0b':'var(--border2)'}}/><span style={{fontSize:11.5,color:data.oral?.[item.id]==='OUI'?'var(--text4)':'var(--text)',textDecoration:data.oral?.[item.id]==='OUI'?'line-through':'none'}}>{item.l}</span></div><Pill val={data.oral?.[item.id]||'NON'} onChange={v=>setData(p=>({...p,oral:{...p.oral,[item.id]:v}}))}/></div></div>))}</div></div>
    </div>)}

    {tab==='questions'&&(<div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:11,flexWrap:'wrap',gap:7}}><div><div className="font-display" style={{fontWeight:700,fontSize:16,color:'var(--text)'}}>Banque de Questions</div><p style={{fontSize:11,color:'var(--text3)'}}>{qDone}/{QUESTION_BANK.length} préparées</p></div><div style={{width:110,height:4,background:'var(--border2)',borderRadius:2}}><div style={{height:'100%',width:`${qDone/QUESTION_BANK.length*100}%`,background:'#22c55e',borderRadius:2}}/></div></div>
      <div style={{display:'flex',gap:5,marginBottom:11,flexWrap:'wrap'}}>{cats.map(c=>(<button key={c} onClick={()=>setQFilter(c)} style={{padding:'4px 11px',borderRadius:20,fontSize:10.5,fontWeight:600,cursor:'pointer',border:'1.5px solid transparent',background:qFilter===c?catColors[c]||'var(--navy)':'var(--bg3)',color:qFilter===c?'#fff':'var(--text3)',borderColor:qFilter===c?'transparent':'var(--border)'}}>{c}</button>))}</div>
      <div style={{display:'flex',flexDirection:'column',gap:6}}>{filteredQ.map((q,i)=>{const isC=data.qchecked?.[q.q];const isO=qOpen===i;return(<div key={i} className="card" style={{overflow:'hidden',borderLeft:`3px solid ${catColors[q.cat]||'#e9a420'}`,background:isC?'rgba(34,197,94,.04)':'var(--bg2)'}}><div style={{padding:'9px 13px',display:'flex',alignItems:'center',gap:8,cursor:'pointer'}} onClick={()=>setQOpen(isO?null:i)}><div style={{width:19,height:19,borderRadius:5,border:`2px solid ${isC?'#22c55e':'var(--border)'}`,background:isC?'#22c55e':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,cursor:'pointer'}} onClick={e=>{e.stopPropagation();setData(p=>({...p,qchecked:{...p.qchecked,[q.q]:!isC}}));}}>{isC&&<span style={{color:'#fff',fontSize:10}}>✓</span>}</div><div style={{flex:1}}><div style={{fontSize:9.5,color:catColors[q.cat],fontWeight:700,marginBottom:1}}>{q.cat}</div><div style={{fontSize:12.5,color:'var(--text)',fontWeight:500}}>{q.q}</div></div><span style={{fontSize:10,color:'var(--text4)',flexShrink:0}}>{isO?'▲':'▼'}</span></div>{isO&&(<div style={{borderTop:'1px solid var(--border)',padding:'11px 13px',background:'var(--bg3)',animation:'fadeIn .2s'}}><div style={{fontSize:11,color:'#0891b2',fontWeight:600,marginBottom:4}}>💡 Conseil :</div><div style={{fontSize:11.5,color:'var(--text2)',lineHeight:1.6,marginBottom:9,background:'rgba(8,145,178,.08)',padding:'7px 11px',borderRadius:7}}>{q.tip}</div><label style={{fontSize:10,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',display:'block',marginBottom:3}}>📝 Ma réponse :</label><textarea value={data.qnotes?.[q.q]||''} onChange={e=>setData(p=>({...p,qnotes:{...p.qnotes,[q.q]:e.target.value}}))} placeholder="Préparez votre réponse..." rows={3} style={{width:'100%',fontSize:12,color:'var(--text2)',border:'1.5px solid var(--border)',borderRadius:7,padding:'7px 10px',resize:'vertical',background:'var(--bg2)'}}/></div>)}</div>);})}
      </div>
    </div>)}

    {tab==='grille'&&(<div>
      <div className="card" style={{overflow:'hidden'}}>
        <div style={{padding:'11px 17px',background:'var(--navy)'}}><div className="font-display" style={{fontWeight:700,fontSize:15,color:'#fff'}}>Simulateur Annexe 19</div><p style={{fontSize:11,color:'#93c5fd',marginTop:1}}>Notez de 0 à 20 pour estimer votre note finale</p></div>
        <table style={{width:'100%',fontSize:12,borderCollapse:'collapse'}}>
          <thead><tr style={{background:'var(--bg3)',borderBottom:'1.5px solid var(--border)'}}><th style={{textAlign:'left',padding:'7px 14px',fontWeight:600,color:'var(--text)'}}>Critère</th><th style={{textAlign:'center',padding:'7px',fontWeight:600,color:'var(--text)',width:55}}>Coef.</th><th style={{textAlign:'center',padding:'7px',fontWeight:600,color:'var(--text)',width:70}}>/20</th><th style={{textAlign:'right',padding:'7px 12px',fontWeight:600,color:'var(--text)',width:65}}>Points</th></tr></thead>
          <tbody>{GRILLE.map((g,i)=>{const n=pn(scores[i]);const pts=n*g.coef;return(<tr key={i} style={{borderBottom:'1px solid var(--border)',background:i%2?'var(--bg3)':'var(--bg2)'}}><td style={{padding:'8px 14px'}}><div style={{fontWeight:600,color:'var(--text)',fontSize:12}}>{g.c}</div><div style={{fontSize:10,color:'var(--text3)',marginTop:1}}>{g.d}</div></td><td style={{textAlign:'center',padding:'8px 6px'}}><span style={{background:'rgba(233,164,32,.15)',color:'#92400e',padding:'1px 8px',borderRadius:20,fontWeight:700,fontSize:10}}>×{g.coef}</span></td><td style={{textAlign:'center',padding:'7px'}}><input type="number" min="0" max="20" step="0.5" value={scores[i]||''} onChange={e=>setData(p=>({...p,grille:{...p.grille,[i]:Math.min(20,Math.max(0,parseFloat(e.target.value)||0))}}))} style={{width:52,textAlign:'center',fontSize:13,fontWeight:700,border:'1.5px solid var(--border)',borderRadius:7,padding:'4px',color:'#e9a420',background:'var(--bg2)',outline:'none'}}/></td><td style={{textAlign:'right',padding:'8px 12px',fontWeight:700,color:n>=12?'#16a34a':n>=8?'#d97706':'var(--text4)',fontSize:13}}>{n>0?pts.toFixed(1):'-'}</td></tr>);})}
          </tbody>
        </table>
        <div style={{padding:'13px 17px',background:'var(--bg3)',borderTop:'2px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:10}}>
          <div><div style={{fontSize:11,color:'var(--text3)'}}>Note simulée</div><div className="font-display" style={{fontSize:32,fontWeight:700,color:parseFloat(nf)>=12?'#16a34a':parseFloat(nf)>=8?'#d97706':'#dc2626'}}>{nf}/20</div></div>
          <div style={{textAlign:'right'}}><div style={{fontSize:11,color:'var(--text3)'}}>Mention</div><div style={{fontSize:16,fontWeight:700,color:'var(--text)'}}>{parseFloat(nf)>=16?'🏆 Très Bien':parseFloat(nf)>=14?'✅ Bien':parseFloat(nf)>=12?'✔️ Assez Bien':parseFloat(nf)>=10?'📘 Passable':'⚠️ Insuffisant'}</div></div>
          <div style={{width:'100%',height:7,background:'var(--border2)',borderRadius:4}}><div style={{height:'100%',width:`${parseFloat(nf)/20*100}%`,background:parseFloat(nf)>=12?'#22c55e':parseFloat(nf)>=8?'#f59e0b':'#ef4444',borderRadius:4,transition:'width .5s'}}/></div>
        </div>
      </div>
    </div>)}
  </div>);
}

/* ══════════════════════════════════════════════════════
   SIDEBAR
══════════════════════════════════════════════════════ */
function Sidebar({active,onNav,prog,dark,toggleDark}){
  const steps=[
    {id:'dashboard',icon:'📊',l:'Avancement',s:'Tableau de bord'},
    {id:'idee',icon:'💡',l:"Idée & Validation",s:'Bilan · Contraintes',col:'#8b5cf6'},
    {id:'marche',icon:'🔍',l:'Étude de Marché',s:'6 Questions · CA · Concurrence',col:'#0891b2'},
    {id:'diagnostic',icon:'📐',l:'Diagnostic',s:'PESTEL · Porter · SWOT',col:'#2563eb'},
    {id:'bmc',icon:'🏗️',l:'Business Model',s:'Canvas 9 blocs',col:'#06b6d4'},
    {id:'finance',icon:'💰',l:'Business Plan',s:'Finance · Plan 3 ans · Seuil SR',col:'#059669'},
    {id:'marketing',icon:'📣',l:'Marketing',s:'Mix 4P · Actions · Lancement',col:'#e9a420'},
    {id:'gestion',icon:'📈',l:'Tableau de Bord',s:'Réel vs Prévu',col:'#d97706'},
    {id:'outils',icon:'🧮',l:'Outils',s:'Prix · Retro · Aides',col:'#7c3aed'},
    {id:'examen',icon:'🎓',l:'Examen',s:'Timer · Questions · Note',col:'#ef4444'},
  ];
  return(<aside style={{width:222,flexShrink:0,background:'#0a1524',height:'100vh',position:'sticky',top:0,display:'flex',flexDirection:'column',overflow:'hidden'}}>
    <div style={{padding:'13px 14px',borderBottom:'1px solid rgba(255,255,255,.08)',display:'flex',alignItems:'center',gap:8}}>
      <div style={{width:32,height:32,borderRadius:9,background:'#e9a420',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'Playfair Display,serif',fontWeight:700,color:'#0a1524',fontSize:15}}>B</div>
      <div><div style={{fontFamily:'Playfair Display,serif',fontWeight:700,color:'#fff',fontSize:14,lineHeight:1.2}}>BTS MCO</div><div style={{fontSize:9,color:'#60a5fa',fontWeight:500}}>Entrepreneuriat Complet</div></div>
    </div>
    <div style={{padding:'9px 13px',borderBottom:'1px solid rgba(255,255,255,.08)'}}>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:9.5,marginBottom:3}}><span style={{color:'#93c5fd'}}>Progression</span><span style={{color:'#fff',fontWeight:700}}>{prog}%</span></div>
      <div style={{height:4,background:'rgba(255,255,255,.1)',borderRadius:2}}><div style={{height:4,borderRadius:2,background:prog===100?'#22c55e':'#e9a420',width:`${prog}%`,transition:'width .6s'}}/></div>
    </div>
    <nav style={{flex:1,padding:'5px 7px',overflowY:'auto',display:'flex',flexDirection:'column',gap:1}}>
      {steps.map(step=>(<button key={step.id} onClick={()=>onNav(step.id)} className={`nav-item ${active===step.id?'active':''}`} style={{background:active===step.id?'rgba(255,255,255,.1)':'transparent'}}>
        <div style={{width:24,height:24,borderRadius:6,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,background:active===step.id?step.col||'#7c3aed':'rgba(255,255,255,.07)',transition:'background .15s'}}>{step.icon}</div>
        <div style={{flex:1,minWidth:0}}><div style={{fontSize:11,fontWeight:600,color:active===step.id?'#fff':'#93c5fd',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{step.l}</div><div style={{fontSize:9,color:'#4b6a8a',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{step.s}</div></div>
        {active===step.id&&<div style={{width:4,height:4,borderRadius:'50%',background:'#e9a420',flexShrink:0}}/>}
      </button>))}
    </nav>
    <div style={{padding:'7px 12px',borderTop:'1px solid rgba(255,255,255,.08)'}}>
      <button onClick={toggleDark} style={{width:'100%',padding:'6px 9px',borderRadius:8,background:'rgba(255,255,255,.07)',border:'1px solid rgba(255,255,255,.1)',color:'#93c5fd',cursor:'pointer',fontSize:10.5,fontWeight:500,display:'flex',alignItems:'center',justifyContent:'center',gap:5,marginBottom:4}}>{dark?'☀️ Mode clair':'🌙 Mode sombre'}</button>
      <p style={{fontSize:8.5,color:'#354d63',textAlign:'center'}}>💾 Sauvegarde automatique</p>
    </div>
  </aside>);
}

/* ══════════════════════════════════════════════════════
   APP
══════════════════════════════════════════════════════ */
function App(){
  const[sec,setSec]=useState('dashboard');
  const[cl,setCl]=useLS('bts_cl',{});
  const[idee,setIdee]=useLS('bts_idee',{});
  const[marche,setMarche]=useLS('bts_marche',{});
  const[diag,setDiag]=useLS('bts_diag',{pestel:{},porter:{},swot:{},ciblage:{}});
  const[bmc,setBmc]=useLS('bts_bmc',{});
  const[fin,setFin]=useLS('bts_fin',{});
  const[mkt,setMkt]=useLS('bts_mkt',{});
  const[gest,setGest]=useLS('bts_gest',{});
  const[outils,setOutils]=useLS('bts_outils',{});
  const[exam,setExam]=useLS('bts_exam',{});
  const[dark,setDark]=useLS('bts_dark',false);
  const[confetti,setConfetti]=useState(false);
  const{toasts,add,rm}=useToasts();
  const prev=useRef(0);
  const allItems=Object.values(CHECKLIST_DEF).flatMap(c=>c.items);
  const prog=Math.round(allItems.filter(i=>cl[i.id]==='OUI').length/allItems.length*100);
  useEffect(()=>{document.body.className=dark?'dark':'';},[dark]);
  useEffect(()=>{if(prog===100&&prev.current<100){setConfetti(true);setTimeout(()=>setConfetti(false),5000);}prev.current=prog;},[prog]);
  const labels={dashboard:'Avancement',idee:'Idée & Validation',marche:'Étude de Marché',diagnostic:'Diagnostic Stratégique',bmc:'Business Model Canvas',finance:'Business Plan & Finance',marketing:'Marketing & Lancement',gestion:'Tableau de Bord',outils:'Outils & Ressources',examen:'Préparation Examen'};
  return(<div style={{display:'flex',height:'100vh',overflow:'hidden',background:'var(--bg)'}}>
    <Confetti active={confetti}/>
    <Toast toasts={toasts} rm={rm}/>
    <Sidebar active={sec} onNav={setSec} prog={prog} dark={dark} toggleDark={()=>setDark(d=>!d)}/>
    <main style={{flex:1,overflowY:'auto'}}>
      <div style={{maxWidth:1060,margin:'0 auto',padding:'18px 22px 80px'}}>
        <div className="no-print" style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20,flexWrap:'wrap',gap:9}}>
          <div style={{display:'flex',alignItems:'center',gap:5,fontSize:11.5,color:'var(--text3)'}}><span>BTS MCO</span><span>›</span><span style={{color:'var(--text)',fontWeight:600}}>{labels[sec]}</span></div>
          <div style={{display:'flex',alignItems:'center',gap:7}}>
            <div style={{background:'rgba(233,164,32,.15)',color:'#92400e',padding:'3px 11px',borderRadius:20,fontSize:10.5,fontWeight:700}}>{prog}% complété</div>
            <button onClick={()=>window.print()} style={{fontSize:10.5,color:'var(--text3)',padding:'4px 11px',border:'1.5px solid var(--border)',borderRadius:7,background:'var(--bg2)',cursor:'pointer'}}>🖨️ Imprimer</button>
          </div>
        </div>
        {sec==='dashboard'&&<Dashboard cl={cl} setCl={setCl} toast={add}/>}
        {sec==='idee'&&<div><IdeeModule data={idee} setData={setIdee}/><div style={{marginTop:16}}><AIAssistant context={idee} sectionName="Idée & Validation"/></div></div>}
        {sec==='marche'&&<div><MarcheModule data={marche} setData={setMarche}/><div style={{marginTop:16}}><AIAssistant context={marche} sectionName="Étude de Marché"/></div></div>}
        {sec==='diagnostic'&&<div><DiagnosticModule data={diag} setData={setDiag}/><div style={{marginTop:16}}><AIAssistant context={diag} sectionName="Diagnostic Stratégique"/></div></div>}
        {sec==='bmc'&&<div><BMCModule data={bmc} setData={setBmc}/><div style={{marginTop:16}}><AIAssistant context={bmc} sectionName="Business Model Canvas"/></div></div>}
        {sec==='finance'&&<FinanceModule data={fin} setData={setFin}/>}
        {sec==='marketing'&&<div><MarketingModule data={mkt} setData={setMkt}/><div style={{marginTop:16}}><AIAssistant context={mkt} sectionName="Marketing & Lancement"/></div></div>}
        {sec==='gestion'&&<GestionModule data={gest} setData={setGest} finData={fin}/>}
        {sec==='outils'&&<OutilsModule data={outils} setData={setOutils}/>}
        {sec==='examen'&&<ExamenModule data={exam} setData={setExam}/>}
      </div>
    </main>
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
